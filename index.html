<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리 동아리 정상운영 합니다!</title>
  <style>
    :root {
      /* 마법소녀/소년 느낌의 통통 튀는 파스텔 컬러 팔레트 */
      --bg-gradient: linear-gradient(135deg, #ffe6f2 0%, #e6e6ff 50%, #e6f9ff 100%);
      --folder-cover: #ffd1dc; /* 딸기우유 핑크 */
      --folder-border: #ff85a2; /* 진한 핑크 테두리 */
      --paper: #ffffff;
      --line: #ffe0eb; /* 귀여운 핑크색 노트 선 */
      --ink: #5c3a6b; /* 너무 까맣지 않은 부드러운 보라빛 텍스트 */
      --point: #ff549a; /* 마법의 핫핑크 */
      --point-dark: #cc0066;
      --accent: #ffcc00; /* 반짝이는 별빛 옐로우 */
      --magic-blue: #66ccff; /* 마법소년 느낌 스카이블루 */
      --shadow: 0 16px 40px rgba(255, 102, 178, 0.25);
      --radius: 32px;
      --radius-sm: 20px;
      --header-h: 100px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", "Comic Sans MS", sans-serif;
      color: var(--ink);
      background: var(--bg-gradient);
      /* 귀여운 땡땡이 배경 패턴 추가 */
      background-image: radial-gradient(#fff 15%, transparent 16%), radial-gradient(#fff 15%, transparent 16%);
      background-size: 30px 30px;
      background-position: 0 0, 15px 15px;
    }

    button, input, textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: none;
      background: none;
    }

    .app {
      min-height: 100vh;
      padding: 30px;
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    /* 서류철(바인더) 외곽 */
    .folder {
      position: relative;
      width: min(1400px, 100%);
      min-height: calc(100vh - 60px);
      background: var(--folder-cover);
      border: 4px solid var(--folder-border);
      border-radius: 36px;
      box-shadow: 
        inset 0 0 0 8px rgba(255, 255, 255, 0.5), /* 바인더 안쪽 테두리 */
        var(--shadow);
      overflow: hidden;
    }

    /* 서류철 링 느낌 */
    .folder::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 40px;
      background: rgba(255,255,255,0.4);
      border-right: 4px dashed var(--folder-border);
      z-index: 10;
    }

    .folder::after {
      content: "✨ ✨ ✨";
      position: absolute;
      right: 30px;
      top: 24px;
      font-size: 1.2rem;
      letter-spacing: 12px;
      color: #fff;
      text-shadow: 0 2px 4px rgba(255, 133, 162, 0.6);
      pointer-events: none;
      z-index: 25;
    }

    .titlebar {
      position: sticky;
      top: 0;
      z-index: 20;
      min-height: var(--header-h);
      padding: 30px 40px 0px 60px; /* 왼쪽 바인더 링 피해서 패딩 */
      background: transparent;
      display: flex;
      align-items: flex-end; /* 탭이 바닥에 붙도록 */
      justify-content: space-between;
      gap: 20px;
    }

    h1 {
      margin: 0;
      padding-bottom: 20px;
      font-size: clamp(1.8rem, 2.5vw, 2.6rem);
      letter-spacing: -0.02em;
      font-weight: 900;
      color: var(--point);
      text-shadow: 
        3px 3px 0px #fff, 
        -1px -1px 0px #fff,  
        1px -1px 0px #fff,
        -1px 1px 0px #fff,
        1px 1px 0px #fff;
    }

    h1::before {
      content: "💖 ";
    }

    .index-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      position: relative;
      top: 4px; /* 종이와 겹치게 */
    }

    /* 서류철 인덱스 탭 디자인 */
    .tab-btn {
      min-width: 140px;
      padding: 16px 20px 20px;
      border-radius: 24px 24px 0 0;
      background: #ffb3c6;
      border: 4px solid var(--folder-border);
      border-bottom: none;
      color: #fff;
      font-weight: 900;
      font-size: 1.1rem;
      text-shadow: 1px 1px 0 var(--folder-border);
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .tab-btn:hover {
      background: #ff99b3;
      transform: translateY(-4px);
    }

    .tab-btn.active {
      background: var(--paper);
      color: var(--point);
      border-color: var(--point);
      text-shadow: none;
      padding-bottom: 24px;
      z-index: 2;
    }

    .content {
      padding: 0 30px 30px 60px;
      position: relative;
      z-index: 1;
    }

    .page {
      display: none;
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .page.active {
      display: block;
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.98) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* 다이어리 속지 느낌 */
    .paper {
      position: relative;
      background: 
        repeating-linear-gradient(
          180deg,
          transparent 0,
          transparent 39px,
          var(--line) 39px,
          var(--line) 40px
        ),
        var(--paper);
      background-position: 0 10px;
      border: 4px solid var(--point);
      border-radius: 0 var(--radius) var(--radius) var(--radius);
      padding: 40px;
      min-height: calc(100vh - var(--header-h) - 90px);
      box-shadow: 6px 6px 0px rgba(255, 102, 178, 0.2);
    }

    .paper::after {
      content: "★";
      position: absolute;
      bottom: 20px;
      right: 20px;
      color: var(--accent);
      font-size: 2rem;
      text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
    }

    .character-grid-wrap {
      display: grid;
      gap: 30px;
    }

    .team-row {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 24px;
    }

    /* 캐릭터 카드 - 마법소녀 포토카드 느낌 */
    .char-card {
      position: relative;
      background: #fff;
      border: 3px solid #ffd1dc;
      border-radius: var(--radius-sm);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 8px 0 #ffe6f2;
    }

    .char-card::before {
      content: "⭐";
      position: absolute;
      top: -12px;
      right: -12px;
      font-size: 1.5rem;
      filter: drop-shadow(0 2px 4px rgba(255,204,0,0.4));
      z-index: 2;
      opacity: 0;
      transform: scale(0);
      transition: all 0.2s ease;
    }

    .char-card:hover {
      transform: translateY(-8px) rotate(-2deg);
      border-color: var(--point);
      box-shadow: 0 12px 0 #ffb3c6;
    }

    .char-card:hover::before {
      opacity: 1;
      transform: scale(1) rotate(15deg);
    }

    .char-thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      overflow: hidden;
      background: #fdf5ff;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed #ffb3c6;
    }

    /* 절대 건드리지 않은 이미지 영역 */
    .char-thumb img,
    .profile-visual img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #ffffff;
      display: block;
      filter: none !important;
      image-rendering: auto;
    }

    .char-name {
      width: 100%;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--point-dark);
      background: #ffe6f2;
      padding: 6px 0;
      border-radius: 12px;
      word-break: keep-all;
    }

    .profile-page-inner {
      display: grid;
      grid-template-columns: minmax(320px, 430px) minmax(0, 1fr);
      gap: 36px;
      align-items: start;
    }

    .profile-side {
      position: sticky;
      top: calc(var(--header-h) + 40px);
      display: grid;
      gap: 20px;
    }

    .back-btn {
      align-self: flex-start;
      padding: 12px 24px;
      border-radius: 999px;
      background: #fff;
      border: 3px solid var(--folder-border);
      color: var(--point);
      font-weight: 900;
      box-shadow: 0 4px 0 var(--folder-border);
      transition: transform 0.1s;
    }
    .back-btn:active {
      transform: translateY(4px);
      box-shadow: 0 0 0 var(--folder-border);
    }

    .profile-visual-card {
      background: #fff;
      border: 4px solid var(--point);
      border-radius: 32px;
      padding: 24px;
      box-shadow: 8px 8px 0px rgba(255, 84, 154, 0.2);
    }

    .profile-visual {
      width: 100%;
      aspect-ratio: 2 / 3;
      border-radius: 20px;
      overflow: hidden;
      background: #fdf5ff;
      border: 3px dashed #ffb3c6;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 대망의 변신 버튼 - 화려하게! */
    .transform-btn {
      width: 100%;
      margin-top: 20px;
      padding: 18px 16px;
      border-radius: 20px;
      background: linear-gradient(45deg, var(--point), #ff85a2, var(--accent), var(--point));
      background-size: 300% 300%;
      animation: magicGlow 3s ease infinite;
      color: #fff;
      font-weight: 900;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      border: 3px solid #fff;
      box-shadow: 0 8px 24px rgba(255, 84, 154, 0.5);
      text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
      transition: transform 0.2s;
    }
    .transform-btn:hover {
      transform: scale(1.03);
    }
    .transform-btn:active {
      transform: scale(0.95);
    }

    @keyframes magicGlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .transform-btn.active {
      background: linear-gradient(45deg, var(--magic-blue), #b3e6ff, #ffccff, var(--magic-blue));
      background-size: 300% 300%;
      box-shadow: 0 8px 24px rgba(102, 204, 255, 0.5);
      color: #fff;
    }

    .profile-detail-card {
      background: rgba(255, 255, 255, 0.9);
      border: 3px solid #ffb3c6;
      border-radius: 32px;
      padding: 30px;
      box-shadow: inset 0 0 20px #fff5f8;
      min-width: 0;
    }

    .profile-detail-list {
      display: grid;
      gap: 16px;
    }

    .detail-item {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 20px;
      align-items: start;
      padding: 18px 0;
      border-bottom: 2px dashed #ffcce0;
    }

    .detail-item:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-weight: 900;
      color: #fff;
      background: var(--point);
      padding: 6px 16px;
      border-radius: 12px;
      text-align: center;
      transform: rotate(-2deg);
    }

    .detail-value {
      min-width: 0;
      white-space: pre-wrap;
      line-height: 1.8;
      word-break: keep-all;
      font-weight: 700;
      padding-top: 4px;
    }

    .guide-wrap {
      display: grid;
      gap: 30px;
    }

    .guide-list {
      display: grid;
      gap: 16px;
    }

    .guide-item {
      background: #fff;
      border: 3px solid #ffd1dc;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 4px 0 #ffe6f2;
      transition: all 0.2s ease;
    }
    .guide-item:hover {
      border-color: var(--point);
    }

    .guide-question {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      padding: 20px 24px;
      text-align: left;
      font-weight: 900;
      font-size: 1.1rem;
      color: var(--point-dark);
      background: transparent;
    }

    .guide-question span:first-child::before {
      content: "Q. ";
      color: var(--point);
    }

    .guide-question span:last-child {
      font-size: 1.2rem;
      color: var(--point);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      background: #ffe6f2;
      border-radius: 50%;
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
    }

    .guide-item.open .guide-question span:last-child {
      transform: rotate(90deg);
      background: var(--point);
      color: #fff;
    }

    .guide-answer {
      display: none;
      padding: 0 24px 24px;
      line-height: 1.8;
      white-space: pre-wrap;
      color: var(--ink);
      font-weight: 700;
    }
    
    .guide-item.open .guide-answer {
      display: block;
      animation: fadeInDown 0.3s ease;
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .guide-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 0 24px 20px;
    }

    .mini-btn {
      padding: 8px 16px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 900;
      background: #ffe6f2;
      color: var(--point);
      border: 2px solid transparent;
    }
    .mini-btn:hover { border-color: var(--point); }

    .mini-btn.delete {
      background: #fff0f0;
      color: #ff3333;
    }
    .mini-btn.delete:hover { border-color: #ff3333; }

    .editor-card {
      background: #fff;
      border: 4px dashed #ffb3c6;
      border-radius: 32px;
      padding: 30px;
      display: grid;
      gap: 20px;
      margin-top: 20px;
    }

    .editor-card h2 {
      margin: 0;
      font-size: 1.4rem;
      color: var(--point);
    }
    .editor-card h2::before { content: "✍️ "; }

    .form-grid {
      display: grid;
      gap: 16px;
    }

    .form-grid label {
      display: grid;
      gap: 10px;
      font-weight: 900;
      color: var(--point-dark);
    }

    .form-grid input,
    .form-grid textarea {
      width: 100%;
      padding: 16px 20px;
      border-radius: 20px;
      border: 3px solid #ffe0eb;
      background: #fdf5ff;
      color: var(--ink);
      outline: none;
      font-weight: 700;
      transition: border-color 0.2s;
    }
    .form-grid input:focus,
    .form-grid textarea:focus {
      border-color: var(--point);
      background: #fff;
    }

    .form-grid textarea {
      min-height: 160px;
      resize: vertical;
      line-height: 1.7;
    }

    .editor-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 10px;
    }

    .primary-btn,
    .secondary-btn,
    .ghost-btn {
      padding: 14px 20px;
      border-radius: 16px;
      font-weight: 900;
      font-size: 1.05rem;
      border: 3px solid transparent;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .primary-btn:active, .secondary-btn:active, .ghost-btn:active {
      transform: translateY(2px);
    }

    .primary-btn {
      background: var(--point);
      color: #fff;
      box-shadow: 0 4px 0 #cc0066;
    }
    .primary-btn:active { box-shadow: 0 0 0 #cc0066; }

    .secondary-btn {
      background: var(--accent);
      color: #997a00;
      box-shadow: 0 4px 0 #cca300;
    }
    .secondary-btn:active { box-shadow: 0 0 0 #cca300; }

    .ghost-btn {
      background: #fff;
      color: var(--point);
      border-color: #ffb3c6;
    }

    .status-text {
      min-height: 1.4em;
      font-size: 1rem;
      font-weight: 900;
      color: var(--point);
      text-align: right;
    }

    @media (max-width: 1200px) {
      .team-row {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .profile-page-inner {
        grid-template-columns: 1fr;
      }
      .profile-side {
        position: static;
      }
    }

    @media (max-width: 760px) {
      .app {
        padding: 16px;
      }
      .folder {
        border-radius: 24px;
      }
      .folder::before {
        width: 20px; /* 모바일에서 바인더 링 얇게 */
      }
      .titlebar {
        padding: 24px 20px 0px 30px;
        align-items: flex-start;
        flex-direction: column;
      }
      .content {
        padding: 0 16px 16px 30px;
      }
      .paper {
        padding: 24px 20px;
        border-radius: 0 16px 16px 16px;
      }
      .team-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }
      .detail-item {
        grid-template-columns: 1fr;
        gap: 8px;
        border-bottom: none;
        background: #fdf5ff;
        padding: 16px;
        border-radius: 16px;
      }
      .detail-label {
        align-self: flex-start;
        transform: none;
      }
      .tab-btn {
        min-width: 110px;
        padding: 12px 16px 16px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="folder">
      <header class="titlebar">
        <h1>우리 동아리 정상운영 합니다!</h1>
        <nav class="index-tabs">
          <button class="tab-btn active" data-target="charactersPage">첫번째 인덱스</button>
          <button class="tab-btn" data-target="guidePage">두번째 인덱스</button>
        </nav>
      </header>

      <main class="content">
        <section class="page active" id="charactersPage">
          <div class="paper">
            <div class="character-grid-wrap" id="characterGridWrap"></div>
          </div>
        </section>

        <section class="page" id="profilePage">
          <div class="paper">
            <div class="profile-page-inner">
              <div class="profile-side">
                                <div class="profile-visual-card">
                  <div class="profile-visual">
                    <img id="profileBodyImage" src="" alt="캐릭터 전신 사진" />
                  </div>
                  <button class="transform-btn" id="transformBtn">변신!</button>
                </div>
              </div>

              <div class="profile-detail-card">
                <div class="profile-detail-list" id="profileDetailList"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="page" id="guidePage">
          <div class="paper">
            <div class="guide-wrap">
              <div class="guide-list" id="guideList"></div>

              <div class="editor-card">
                <h2>플레이 가이드 항목 편집</h2>
                <div class="form-grid">
                  <label>
                    질문
                    <input type="text" id="guideQuestionInput" placeholder="질문을 입력하세요" />
                  </label>
                  <label>
                    내용
                    <textarea id="guideAnswerInput" placeholder="답변 내용을 입력하세요"></textarea>
                  </label>
                </div>
                <div class="editor-actions">
                  <button class="primary-btn" id="addGuideBtn">새 항목 추가</button>
                  <button class="secondary-btn" id="updateGuideBtn">선택 항목 수정</button>
                  <button class="ghost-btn" id="clearGuideBtn">입력칸 비우기</button>
                  <button class="ghost-btn" id="resetGuideBtn">기본 항목 복원</button>
                </div>
                <div class="status-text" id="guideStatus"></div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>
    /*
      ==========================
      수정이 쉬운 구간
      1) characterData 안의 텍스트/이미지 경로를 바꾸면 캐릭터 정보가 바뀝니다.
      2) 가이드는 화면 안에서 추가/수정/삭제 가능하며 localStorage에 저장됩니다.
      3) 이미지는 같은 저장소 안에 넣고 상대 경로로 연결하면 됩니다.
          예시: "images/char01_thumb.png"
      ==========================
    */

    function makePlaceholder(label, ratio = "square") {
      const width = ratio === "portrait" ? 800 : 800;
      const height = ratio === "portrait" ? 1200 : 800;
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
          <rect width="100%" height="100%" fill="#ffffff"/>
          <rect x="28" y="28" width="${width - 56}" height="${height - 56}" rx="24" fill="#f4efe7" stroke="#496b9f" stroke-width="4" stroke-dasharray="10 10"/>
          <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" font-size="42" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" fill="#496b9f" font-weight="700">${label}</text>
        </svg>
      `;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    const characterData = [
      {
        id: 1,
        team: 1,
        name: "캐릭터 01",

    const defaultGuideItems = [

      }
    ];

    const pageEls = document.querySelectorAll(".page");
    const tabBtns = document.querySelectorAll(".tab-btn");
    const characterGridWrap = document.getElementById("characterGridWrap");
        const transformBtn = document.getElementById("transformBtn");
    const profileBodyImage = document.getElementById("profileBodyImage");
    const profileDetailList = document.getElementById("profileDetailList");
    const guideList = document.getElementById("guideList");
    const guideQuestionInput = document.getElementById("guideQuestionInput");
    const guideAnswerInput = document.getElementById("guideAnswerInput");
    const addGuideBtn = document.getElementById("addGuideBtn");
    const updateGuideBtn = document.getElementById("updateGuideBtn");
    const clearGuideBtn = document.getElementById("clearGuideBtn");
    const resetGuideBtn = document.getElementById("resetGuideBtn");
    const guideStatus = document.getElementById("guideStatus");

    let selectedCharacterId = null;
    let isTransformMode = false;
    let editingGuideIndex = null;

    function getCharacterById(id) {
      return characterData.find(character => character.id === id);
    }

    function showPage(pageId) {
      pageEls.forEach(page => page.classList.toggle("active", page.id === pageId));
      tabBtns.forEach(btn => btn.classList.toggle("active", btn.dataset.target === pageId || (pageId === "profilePage" && btn.dataset.target === "charactersPage")));
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function setRoute(hash) {
      if (location.hash === hash) {
        syncFromHash();
        return;
      }
      location.hash = hash;
    }

    function syncFromHash() {
      const hash = location.hash || "#characters";

      if (hash.startsWith("#character-")) {
        const id = Number(hash.replace("#character-", ""));
        const character = getCharacterById(id);
        if (character) {
          selectedCharacterId = id;
          isTransformMode = false;
          renderProfile();
          showPage("profilePage");
          return;
        }
      }

      if (hash === "#guide") {
        showPage("guidePage");
        return;
      }

      showPage("charactersPage");
    }

    function renderCharacters() {
      const team1 = characterData.filter(item => item.team === 1);
      const team2 = characterData.filter(item => item.team === 2);

      characterGridWrap.innerHTML = [team1, team2].map(team => {
        const cards = team.map(character => `
          <button class="char-card" type="button" onclick="openProfile(${character.id})">
            <div class="char-thumb">
              <img src="${character.thumb}" alt="${character.name} 프로필 사진" />
            </div>
            <div class="char-name">${character.name}</div>
          </button>
        `).join("");

        return `<div class="team-row">${cards}</div>`;
      }).join("");
    }

    function openProfile(id) {
      setRoute(`#character-${id}`);
    }

    function renderProfile() {
      const character = getCharacterById(selectedCharacterId);
      if (!character) return;

      const current = isTransformMode ? {
        name: character.transform.name,
        gender: character.gender,
        age: character.age,
        appearance: character.transform.appearance,
        personality: character.transform.personality,
        feature: character.transform.feature,
        transformName: character.transform.transformName,
        body: character.transform.body
      } : {
        name: character.name,
        gender: character.gender,
        age: character.age,
        appearance: character.appearance,
        personality: character.personality,
        feature: character.feature,
        body: character.body
      };

      profileBodyImage.src = current.body;
      profileBodyImage.alt = `${current.name} 전신 사진`;

      const detailRows = [
        ["이름", current.name],
        ...(isTransformMode ? [["변신명", current.transformName]] : []),
        ["성별", current.gender],
        ["나이", current.age],
        ["외관", current.appearance],
        ["성격", current.personality],
        ["특징", current.feature]
      ];

      profileDetailList.innerHTML = detailRows.map(([label, value]) => `
        <div class="detail-item">
          <div class="detail-label">${label}</div>
          <div class="detail-value">${value}</div>
        </div>
      `).join("");

      transformBtn.classList.toggle("active", isTransformMode);
      transformBtn.textContent = isTransformMode ? "원래대로" : "변신!";
    }

    function toggleTransform() {
      if (!selectedCharacterId) return;
      isTransformMode = !isTransformMode;
      renderProfile();
    }

    function getGuideItems() {
      const saved = localStorage.getItem("clubGuideItems");
      if (!saved) return [...defaultGuideItems];

      try {
        const parsed = JSON.parse(saved);
        return Array.isArray(parsed) ? parsed : [...defaultGuideItems];
      } catch {
        return [...defaultGuideItems];
      }
    }

    function saveGuideItems(items) {
      localStorage.setItem("clubGuideItems", JSON.stringify(items));
    }

    let guideItems = getGuideItems();

    function setGuideStatus(message) {
      guideStatus.textContent = message;
    }

    function clearGuideEditor() {
      editingGuideIndex = null;
      guideQuestionInput.value = "";
      guideAnswerInput.value = "";
      setGuideStatus("");
    }

    function fillGuideEditor(index) {
      const item = guideItems[index];
      if (!item) return;
      editingGuideIndex = index;
      guideQuestionInput.value = item.question;
      guideAnswerInput.value = item.answer;
      setGuideStatus(`선택된 항목: ${index + 1}번`);
      guideQuestionInput.focus();
    }

    function renderGuide() {
      guideList.innerHTML = guideItems.map((item, index) => `
        <div class="guide-item">
          <button type="button" class="guide-question" onclick="toggleGuideItem(${index}, this)">
            <span>${item.question}</span>
            <span>▶</span>
          </button>
          <div class="guide-answer">${item.answer}</div>
          <div class="guide-actions">
            <button type="button" class="mini-btn" onclick="fillGuideEditor(${index})">수정</button>
            <button type="button" class="mini-btn delete" onclick="deleteGuideItem(${index})">삭제</button>
          </div>
        </div>
      `).join("");
    }

    function toggleGuideItem(index, buttonEl) {
      const item = buttonEl.closest(".guide-item");
      item.classList.toggle("open");
    }

    function addGuideItem() {
      const question = guideQuestionInput.value.trim();
      const answer = guideAnswerInput.value.trim();

      if (!question || !answer) {
        setGuideStatus("질문과 내용을 모두 입력해야 합니다.");
        return;
      }

      guideItems.push({ question, answer });
      saveGuideItems(guideItems);
      renderGuide();
      clearGuideEditor();
      setGuideStatus("새 항목이 추가되었습니다.");
    }

    function updateGuideItem() {
      if (editingGuideIndex === null) {
        setGuideStatus("먼저 수정할 항목을 선택하세요.");
        return;
      }

      const question = guideQuestionInput.value.trim();
      const answer = guideAnswerInput.value.trim();

      if (!question || !answer) {
        setGuideStatus("질문과 내용을 모두 입력해야 합니다.");
        return;
      }

      guideItems[editingGuideIndex] = { question, answer };
      saveGuideItems(guideItems);
      renderGuide();
      clearGuideEditor();
      setGuideStatus("선택한 항목이 수정되었습니다.");
    }

    function deleteGuideItem(index) {
      guideItems.splice(index, 1);
      saveGuideItems(guideItems);
      renderGuide();
      if (editingGuideIndex === index) clearGuideEditor();
      setGuideStatus("선택한 항목이 삭제되었습니다.");
    }

    function resetGuideItems() {
      guideItems = [...defaultGuideItems];
      saveGuideItems(guideItems);
      renderGuide();
      clearGuideEditor();
      setGuideStatus("기본 항목으로 복원되었습니다.");
    }

    tabBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        const targetHash = btn.dataset.target === "guidePage" ? "#guide" : "#characters";
        setRoute(targetHash);
      });
    });

    window.addEventListener("hashchange", syncFromHash);

    transformBtn.addEventListener("click", toggleTransform);
    addGuideBtn.addEventListener("click", addGuideItem);
    updateGuideBtn.addEventListener("click", updateGuideItem);
    clearGuideBtn.addEventListener("click", clearGuideEditor);
    resetGuideBtn.addEventListener("click", resetGuideItems);

    renderCharacters();
    renderGuide();
    if (!location.hash) {
      location.hash = "#characters";
    } else {
      syncFromHash();
    }

    window.openProfile = openProfile;
    window.toggleGuideItem = toggleGuideItem;
    window.fillGuideEditor = fillGuideEditor;
    window.deleteGuideItem = deleteGuideItem;
