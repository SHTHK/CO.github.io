<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리 동아리 정상운영 합니다!</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #ffe6f2 0%, #e6e6ff 50%, #e6f9ff 100%);
      --folder-cover: #ffd1dc;
      --folder-border: #ff85a2;
      --paper: #ffffff;
      --line: #ffe0eb;
      --ink: #5c3a6b;
      --point: #ff549a;
      --point-dark: #cc0066;
      --accent: #ffcc00;
      --magic-blue: #66ccff;
      --shadow: 0 16px 40px rgba(255, 102, 178, 0.25);
      --radius: 32px;
      --radius-sm: 20px;
      --header-h: 100px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", "Comic Sans MS", sans-serif;
      color: var(--ink);
      background: var(--bg-gradient);
      background-image: radial-gradient(#fff 15%, transparent 16%), radial-gradient(#fff 15%, transparent 16%);
      background-size: 30px 30px;
      background-position: 0 0, 15px 15px;
    }

    button, input, textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: none;
      background: none;
    }

    .app {
      min-height: 100vh;
      padding: 30px;
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .folder {
      position: relative;
      width: min(1400px, 100%);
      min-height: calc(100vh - 60px);
      background: var(--folder-cover);
      border: 4px solid var(--folder-border);
      border-radius: 36px;
      box-shadow: 
        inset 0 0 0 8px rgba(255, 255, 255, 0.5),
        var(--shadow);
      overflow: hidden;
    }

    .folder::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 40px;
      background: rgba(255,255,255,0.4);
      border-right: 4px dashed var(--folder-border);
      z-index: 10;
    }

    .titlebar {
      position: sticky;
      top: 0;
      z-index: 20;
      min-height: var(--header-h);
      padding: 30px 40px 0px 60px;
      background: transparent;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
    }

    h1 {
      margin: 0;
      padding-bottom: 20px;
      font-size: clamp(1.8rem, 2.5vw, 2.6rem);
      letter-spacing: -0.02em;
      font-weight: 900;
      color: var(--point);
      text-shadow: 
        3px 3px 0px #fff, 
        -1px -1px 0px #fff,  
        1px -1px 0px #fff,
        -1px 1px 0px #fff,
        1px 1px 0px #fff;
      /* 제목 단어 단위로 예쁘게 줄바꿈 */
      word-break: keep-all; 
    }

    .index-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      position: relative;
      top: 4px;
    }

    .tab-btn {
      min-width: 140px;
      padding: 16px 20px 20px;
      border-radius: 24px 24px 0 0;
      background: #ffb3c6;
      border: 4px solid var(--folder-border);
      border-bottom: none;
      color: #fff;
      font-weight: 900;
      font-size: 1.1rem;
      text-shadow: 1px 1px 0 var(--folder-border);
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .tab-btn:hover {
      background: #ff99b3;
      transform: translateY(-4px);
    }

    .tab-btn.active {
      background: var(--paper);
      color: var(--point);
      border-color: var(--point);
      text-shadow: none;
      padding-bottom: 24px;
      z-index: 2;
    }

    .content {
      padding: 0 30px 30px 60px;
      position: relative;
      z-index: 1;
    }

    .page {
      display: none;
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .page.active {
      display: block;
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.98) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .paper {
      position: relative;
      background: 
        repeating-linear-gradient(
          180deg,
          transparent 0,
          transparent 39px,
          var(--line) 39px,
          var(--line) 40px
        ),
        var(--paper);
      background-position: 0 10px;
      border: 4px solid var(--point);
      border-radius: 0 var(--radius) var(--radius) var(--radius);
      padding: 40px;
      min-height: calc(100vh - var(--header-h) - 90px);
      box-shadow: 6px 6px 0px rgba(255, 102, 178, 0.2);
    }

    .paper::after {
      content: "★";
      position: absolute;
      bottom: 20px;
      right: 20px;
      color: var(--accent);
      font-size: 2rem;
      text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
    }

    .character-grid-wrap {
      display: grid;
      gap: 30px;
    }

    .team-section {
      background: rgba(255, 255, 255, 0.6);
      border: 3px dashed #ffb3c6;
      border-radius: 28px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .team-heading {
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 3px double #ffcce0;
    }

    .team-name {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--point-dark);
      letter-spacing: 0.05em;
    }

    .team-row {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 20px;
    }

    .char-card {
      position: relative;
      background: #fff;
      border: 3px solid #ffd1dc;
      border-radius: var(--radius-sm);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 8px 0 #ffe6f2;
    }

    .char-card::before {
      content: "⭐";
      position: absolute;
      top: -12px;
      right: -12px;
      font-size: 1.5rem;
      filter: drop-shadow(0 2px 4px rgba(255,204,0,0.4));
      z-index: 2;
      opacity: 0;
      transform: scale(0);
      transition: all 0.2s ease;
    }

    .char-card:hover {
      transform: translateY(-8px) rotate(-2deg);
      border-color: var(--point);
      box-shadow: 0 12px 0 #ffb3c6;
    }

    .char-card:hover::before {
      opacity: 1;
      transform: scale(1) rotate(15deg);
    }

    .char-thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      overflow: hidden;
      background: #fdf5ff;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed #ffb3c6;
    }

    .char-thumb img,
    .profile-visual img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #ffffff;
      display: block;
      filter: none !important;
      image-rendering: auto;
    }

    .char-name {
      width: 100%;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--point-dark);
      background: #ffe6f2;
      padding: 6px 0;
      border-radius: 12px;
      word-break: keep-all;
    }

    .profile-page-inner {
      display: grid;
      grid-template-columns: minmax(320px, 430px) minmax(0, 1fr);
      gap: 36px;
      align-items: start;
    }

    .profile-side {
      position: sticky;
      top: calc(var(--header-h) + 40px);
      display: grid;
      gap: 20px;
    }

    .back-btn {
      align-self: flex-start;
      padding: 12px 24px;
      border-radius: 999px;
      background: #fff;
      border: 3px solid var(--folder-border);
      color: var(--point);
      font-weight: 900;
      box-shadow: 0 4px 0 var(--folder-border);
      transition: transform 0.1s;
    }
    .back-btn:active {
      transform: translateY(4px);
      box-shadow: 0 0 0 var(--folder-border);
    }

    .profile-visual-card {
      background: #fff;
      border: 4px solid var(--point);
      border-radius: 32px;
      padding: 24px;
      box-shadow: 8px 8px 0px rgba(255, 84, 154, 0.2);
    }

    .profile-visual {
      width: 100%;
      aspect-ratio: 2 / 3;
      border-radius: 20px;
      overflow: hidden;
      background: #fdf5ff;
      border: 3px dashed #ffb3c6;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .transform-btn {
      width: 100%;
      margin-top: 20px;
      padding: 18px 16px;
      border-radius: 20px;
      background: var(--point);
      color: #fff;
      font-weight: 900;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      border: 3px solid #fff;
      box-shadow: 0 8px 24px rgba(255, 84, 154, 0.4);
      transition: all 0.2s ease;
    }
    .transform-btn:hover {
      transform: scale(1.03);
      background: var(--point-dark);
    }
    .transform-btn:active {
      transform: scale(0.95);
    }

    .transform-btn.active {
      background: var(--magic-blue);
      box-shadow: 0 8px 24px rgba(102, 204, 255, 0.4);
    }
    .transform-btn.active:hover {
      background: #3399ff;
    }

    .profile-detail-card {
      background: rgba(255, 255, 255, 0.9);
      border: 3px solid #ffb3c6;
      border-radius: 32px;
      padding: 30px;
      box-shadow: inset 0 0 20px #fff5f8;
      min-width: 0;
    }

    .profile-detail-list {
      display: grid;
      gap: 16px;
    }

    .detail-item {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 20px;
      align-items: start;
      padding: 18px 0;
      border-bottom: 2px dashed #ffcce0;
    }

    .detail-item:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-weight: 900;
      color: #fff;
      background: var(--point);
      padding: 6px 16px;
      border-radius: 12px;
      text-align: center;
      transform: rotate(-2deg);
    }

    /* 긴 글자와 링크 줄바꿈 처리 */
    .detail-value {
      min-width: 0;
      white-space: pre-wrap;
      line-height: 1.8;
      font-weight: 700;
      padding-top: 4px;
      word-break: keep-all; 
      overflow-wrap: anywhere; 
    }

    .guide-wrap {
      display: grid;
      gap: 30px;
    }
    
    .section-title {
      margin: 0;
      font-size: 1.6rem;
      color: var(--point-dark);
      font-weight: 900;
      padding-bottom: 10px;
      border-bottom: 3px dashed #ffcce0;
    }

    .guide-list {
      display: grid;
      gap: 16px;
    }

    .guide-item {
      background: #fff;
      border: 3px solid #ffd1dc;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 4px 0 #ffe6f2;
      transition: all 0.2s ease;
    }
    .guide-item:hover {
      border-color: var(--point);
    }

    .guide-question {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      padding: 20px 24px;
      text-align: left;
      font-weight: 900;
      font-size: 1.1rem;
      color: var(--point-dark);
      background: transparent;
    }

    .guide-question span:first-child::before {
      content: "Q. ";
      color: var(--point);
    }

    .guide-question span:last-child {
      font-size: 1.2rem;
      color: var(--point);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      background: #ffe6f2;
      border-radius: 50%;
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
    }

    .guide-item.open .guide-question span:last-child {
      transform: rotate(90deg);
      background: var(--point);
      color: #fff;
    }

    /* 긴 글자와 링크 줄바꿈 처리 */
    .guide-answer {
      display: none;
      padding: 0 24px 24px;
      line-height: 1.8;
      white-space: pre-wrap;
      color: var(--ink);
      font-weight: 700;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }
    
    .guide-item.open .guide-answer {
      display: block;
      animation: fadeInDown 0.3s ease;
    }

    /* 긴 글자와 링크 줄바꿈 처리 */
    .reference-list {
      display: grid;
      gap: 16px;
    }
    .reference-item {
      background: #fff;
      border: 3px solid #ffd1dc;
      border-radius: 24px;
      box-shadow: 0 4px 0 #ffe6f2;
      padding: 24px;
      line-height: 1.8;
      white-space: pre-wrap;
      color: var(--ink);
      font-weight: 700;
      font-size: 1.05rem;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 1200px) {
      .team-row { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .profile-page-inner { grid-template-columns: 1fr; }
      .profile-side { position: static; }
    }

    /* 모바일 환경 대응 세밀 조정 */
    @media (max-width: 760px) {
      .app { padding: 16px; }
      .folder { border-radius: 24px; }
      .folder::before { width: 20px; }
      
      .titlebar { 
        padding: 24px 20px 0px 30px; 
        align-items: flex-start; 
        flex-direction: column; 
      }
      
      /* 모바일에서 제목 크기 조절 */
      h1 {
        font-size: 1.5rem; 
      }

      .content { padding: 0 16px 16px 30px; }
      .paper { padding: 24px 20px; border-radius: 0 16px 16px 16px; }
      .team-row { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
      .detail-item { grid-template-columns: 1fr; gap: 8px; border-bottom: none; background: #fdf5ff; padding: 16px; border-radius: 16px; }
      .detail-label { align-self: flex-start; transform: none; }
      .tab-btn { min-width: 110px; padding: 12px 16px 16px; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="folder">
      <header class="titlebar">
        <h1>우리 동아리 정상운영 합니다!</h1>
        <nav class="index-tabs">
          <button class="tab-btn active" data-target="charactersPage">캐릭터 소개</button>
          <button class="tab-btn" data-target="guidePage">플레이 안내</button>
        </nav>
      </header>

      <main class="content">
        <section class="page active" id="charactersPage">
          <div class="paper">
            <div class="character-grid-wrap" id="characterGridWrap"></div>
          </div>
        </section>

        <section class="page" id="profilePage">
          <div class="paper">
            <div class="profile-page-inner">
              <div class="profile-side">
                <button class="back-btn" id="backBtn" type="button">← 뒤로가기</button>

                <div class="profile-visual-card">
                  <div class="profile-visual">
                    <img id="profileBodyImage" src="" alt="캐릭터 전신 사진" />
                  </div>
                  <button class="transform-btn" id="transformBtn" type="button">변신!</button>
                </div>
              </div>

              <div class="profile-detail-card">
                <div class="profile-detail-list" id="profileDetailList"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="page" id="guidePage">
          <div class="paper">
            <div class="guide-wrap">
              <h2 class="section-title">문제가 생겼어요!</h2>
              <div class="guide-list" id="guideList"></div>

              <h2 class="section-title" style="margin-top: 10px;">이미지 코드 변경법</h2>
              <div class="reference-list" id="referenceList"></div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

    const pageEls = document.querySelectorAll(".page");
    const tabBtns = document.querySelectorAll(".tab-btn");
    const characterGridWrap = document.getElementById("characterGridWrap");
    const profileBodyImage = document.getElementById("profileBodyImage");
    const profileDetailList = document.getElementById("profileDetailList");
    const transformBtn = document.getElementById("transformBtn");
    const backBtn = document.getElementById("backBtn");
    const guideList = document.getElementById("guideList");
    const referenceList = document.getElementById("referenceList");

    let selectedCharacterId = null;
    let isTransformMode = false;

    function getCharacterById(id) {
      return characterData.find(character => character.id === id);
    }

    function showPage(pageId) {
      pageEls.forEach(page => {
        page.classList.toggle("active", page.id === pageId);
      });

      tabBtns.forEach(btn => {
        const isCharacterTabActive = pageId === "charactersPage" || pageId === "profilePage";
        const shouldActivate = (btn.dataset.target === "charactersPage" && isCharacterTabActive) || btn.dataset.target === pageId;
        btn.classList.toggle("active", shouldActivate);
      });

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function setRoute(hash) {
      if (location.hash === hash) {
        syncFromHash();
        return;
      }
      location.hash = hash;
    }

    function syncFromHash() {
      const hash = location.hash || "#characters";

      if (hash.startsWith("#character-")) {
        const id = Number(hash.replace("#character-", ""));
        const character = getCharacterById(id);

        if (character) {
          selectedCharacterId = id;
          isTransformMode = false;
          renderProfile();
          showPage("profilePage");
          return;
        }
      }

      if (hash === "#guide") {
        showPage("guidePage");
        return;
      }

      showPage("charactersPage");
    }

    function renderTeamSection(teamName, teamMembers) {
      const cards = teamMembers.map(character => `
        <button class="char-card" type="button" onclick="openProfile(${character.id})">
          <div class="char-thumb">
            <img src="${character.thumb}" alt="${character.name} 프로필 사진" />
          </div>
          <div class="char-name">${character.name}</div>
        </button>
      `).join("");

      return `
        <section class="team-section">
          <div class="team-heading">
            <span class="team-name">${teamName}</span>
          </div>
          <div class="team-row">${cards}</div>
        </section>
      `;
    }

    function renderCharacters() {
      const team1 = characterData.filter(item => item.team === 1);
      const team2 = characterData.filter(item => item.team === 2);

      characterGridWrap.innerHTML = [
        renderTeamSection("GLOSS", team1),
        renderTeamSection("FANG", team2)
      ].join("");
    }

    function openProfile(id) {
      setRoute(`#character-${id}`);
    }

    function toggleTransform() {
      if (!selectedCharacterId) return;
      isTransformMode = !isTransformMode;
      renderProfile();
    }

    function renderProfile() {
      const character = getCharacterById(selectedCharacterId);
      if (!character) return;

      const current = isTransformMode
        ? {
            label: "변신명",
            mainName: character.transform.transformName,
            gender: character.gender,
            age: character.age,
            personality: character.transform.personality,
            feature: character.transform.feature,
            body: character.transform.body
          }
        : {
            label: "이름",
            mainName: character.name,
            gender: character.gender,
            age: character.age,
            personality: character.personality,
            feature: character.feature,
            body: character.body
          };

      profileBodyImage.src = current.body;
      profileBodyImage.alt = `${current.mainName} 전신 사진`;

      const detailRows = [
        [current.label, current.mainName],
        ["성별", current.gender],
        ["나이", current.age],
        ["성격", current.personality],
        ["특징", current.feature]
      ];

      profileDetailList.innerHTML = detailRows.map(([label, value]) => `
        <div class="detail-item">
          <div class="detail-label">${label}</div>
          <div class="detail-value">${value}</div>
        </div>
      `).join("");

      transformBtn.classList.toggle("active", isTransformMode);
      transformBtn.textContent = isTransformMode ? "변신 해제!" : "변신!";
    }

    function renderGuide() {
      guideList.innerHTML = qnaItems.map((item, index) => `
        <div class="guide-item">
          <button class="guide-question" type="button" onclick="toggleGuideItem(${index}, this)">
            <span class="q-text">${item.question}</span>
            <span class="guide-arrow">▶</span>
          </button>
          <div class="guide-answer">${item.answer}</div>
        </div>
      `).join("");

      referenceList.innerHTML = referenceItems.map(item => `
        <div class="reference-item">${item}</div>
      `).join("");
    }

    function toggleGuideItem(index, buttonEl) {
      const guideItem = buttonEl.closest(".guide-item");
      guideItem.classList.toggle("open");
    }

    tabBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        const targetHash = btn.dataset.target === "guidePage" ? "#guide" : "#characters";
        setRoute(targetHash);
      });
    });

    backBtn.addEventListener("click", () => {
      if (location.hash.startsWith("#character-") && history.length > 1) {
        history.back();
        setTimeout(() => {
          if (location.hash.startsWith("#character-")) {
            setRoute("#characters");
          }
        }, 120);
      } else {
        setRoute("#characters");
      }
    });

    transformBtn.addEventListener("click", toggleTransform);
    window.addEventListener("hashchange", syncFromHash);

    window.openProfile = openProfile;
    window.toggleGuideItem = toggleGuideItem;

    renderCharacters();
    renderGuide();

    if (!location.hash) {
      location.hash = "#characters";
    }
    syncFromHash();
  </script>
