<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리 동아리 정상운영 합니다!</title>
  <style>
    :root {
      --primary: #ff4785;
      --primary-hover: #e3366f;
      --bg-color: #fcf8fa;
      --surface: #ffffff;
      --text-main: #2d2d2d;
      --text-muted: #6b6b6b;
      --border-color: rgba(255, 71, 133, 0.15);
      --shadow-sm: 0 4px 12px rgba(255, 71, 133, 0.05);
      --shadow-md: 0 12px 32px rgba(255, 71, 133, 0.1);
      --radius-lg: 24px;
      --radius-md: 16px;
      --header-h: 80px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--text-main);
      background: var(--bg-color);
      -webkit-font-smoothing: antialiased;
    }

    button {
      font: inherit;
      border: none;
      cursor: pointer;
      background: none;
      padding: 0;
    }

    .app {
      min-height: 100vh;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .binder {
      width: min(1200px, 100%);
      min-height: calc(100vh - 48px);
      background: var(--surface);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-md);
      display: flex;
      flex-direction: column;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      min-height: var(--header-h);
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      background: rgba(255, 255, 255, 0.85);
      border-bottom: 1px solid var(--border-color);
      backdrop-filter: blur(12px);
    }

    .title {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text-main);
    }

    .tabs {
      display: flex;
      gap: 8px;
      background: var(--bg-color);
      padding: 6px;
      border-radius: 99px;
    }

    .tab-btn {
      padding: 10px 20px;
      border-radius: 99px;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }

    .tab-btn:hover {
      color: var(--primary);
    }

    .tab-btn.active {
      background: var(--surface);
      color: var(--primary);
      box-shadow: var(--shadow-sm);
    }

    .content {
      padding: 32px;
      flex: 1;
    }

    .page {
      display: none;
      animation: fadeUp 0.3s ease forwards;
    }

    .page.active { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .team-blocks {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .team-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
    }

    .char-card {
      background: var(--surface);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      transition: all 0.2s ease;
    }

    .char-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
      border-color: var(--primary);
    }

    .char-thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg-color);
    }

    .char-thumb img,
    .profile-visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .char-name {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text-main);
    }

    /* 프로필 상세 페이지 */
    .profile-layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 40px;
      align-items: start;
    }

    .profile-side {
      position: sticky;
      top: calc(var(--header-h) + 32px);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .back-btn {
      align-self: flex-start;
      padding: 10px 20px;
      border-radius: 99px;
      background: var(--bg-color);
      color: var(--text-main);
      font-weight: 600;
      font-size: 0.95rem;
      border: 1px solid var(--border-color);
      transition: all 0.2s ease;
    }

    .back-btn:hover {
      background: var(--surface);
      color: var(--primary);
      border-color: var(--primary);
    }

    .profile-card {
      background: var(--surface);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      padding: 16px;
      box-shadow: var(--shadow-sm);
    }

    .profile-visual {
      width: 100%;
      aspect-ratio: 2 / 3;
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg-color);
    }

    .transform-btn {
      width: 100%;
      margin-top: 16px;
      padding: 16px;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      font-weight: 700;
      font-size: 1rem;
      transition: all 0.2s ease;
    }

    .transform-btn:hover {
      background: var(--primary-hover);
    }

    .transform-btn.active {
      background: var(--text-main);
    }

    .detail-card {
      background: var(--surface);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      padding: 32px;
      box-shadow: var(--shadow-sm);
    }

    .detail-list {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .detail-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .detail-label {
      font-weight: 700;
      color: var(--primary);
      font-size: 0.95rem;
    }

    .detail-value {
      line-height: 1.6;
      color: var(--text-main);
      white-space: pre-wrap;
    }

    /* 가이드 페이지 */
    .guide-wrap {
      max-width: 800px;
      margin: 0 auto;
    }

    .guide-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .guide-item {
      background: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .guide-item:hover {
      border-color: var(--primary);
    }

    .guide-question {
      width: 100%;
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--text-main);
    }

    .guide-arrow {
      color: var(--text-muted);
      transition: transform 0.2s ease;
    }

    .guide-item.open .guide-arrow {
      transform: rotate(180deg);
      color: var(--primary);
    }

    .guide-answer {
      display: none;
      padding: 0 24px 24px;
      line-height: 1.6;
      color: var(--text-muted);
      white-space: pre-wrap;
    }

    .guide-item.open .guide-answer { display: block; }

    /* 반응형 */
    @media (max-width: 900px) {
      .profile-layout {
        grid-template-columns: 1fr;
      }
      .profile-side {
        position: static;
      }
      .profile-visual {
        max-width: 400px;
        margin: 0 auto;
      }
    }

    @media (max-width: 600px) {
      .app { padding: 0; }
      .binder { border-radius: 0; min-height: 100vh; }
      .header {
        flex-direction: column;
        padding: 20px;
      }
      .tabs { width: 100%; justify-content: center; }
      .content { padding: 20px; }
      .team-row { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .detail-card { padding: 20px; }
    }
  </style>
</head>

            <div class="detail-card">

        <section class="page" id="guidePage">
          <div class="guide-wrap">

          </div>
        </section>
      </main>
    </div>
  </div>

      },
      {
        question: "변신 버튼은 어떤 기능인가요?",
        answer: "프로필 화면의 변신! 버튼을 누르면 변신 버전 프로필로 바뀌고, 다시 누르면 기본 상태로 돌아옵니다."
      }
    ];

    const pages = {
      characters: document.getElementById("charactersPage"),
      profile: document.getElementById("profilePage"),
      guide: document.getElementById("guidePage")
    };

    const tabButtons = document.querySelectorAll(".tab-btn");
    const characterGridWrap = document.getElementById("characterGridWrap");
    const guideList = document.getElementById("guideList");
    const profileBodyImage = document.getElementById("profileBodyImage");
    const profileDetailList = document.getElementById("profileDetailList");
    const transformBtn = document.getElementById("transformBtn");
    const backToListBtn = document.getElementById("backToListBtn");

    let selectedCharacterId = null;
    let isTransformMode = false;

    function getCharacterById(id) {
      return characterData.find(character => character.id === id);
    }

    function setActiveTab(pageKey) {
      tabButtons.forEach(button => {
        const buttonPage = button.dataset.page;
        const isActive = pageKey === "profile"
          ? buttonPage === "characters"
          : buttonPage === pageKey;
        button.classList.toggle("active", isActive);
      });
    }

    function showPage(pageKey) {
      Object.entries(pages).forEach(([key, pageEl]) => {
        pageEl.classList.toggle("active", key === pageKey);
      });
      setActiveTab(pageKey);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function applyRoute() {
      const hash = location.hash || "#characters";

      if (hash === "#guide") {
        showPage("guide");
        return;
      }

      if (hash.startsWith("#character-")) {
        const id = Number(hash.slice("#character-".length));
        const character = getCharacterById(id);
        if (character) {
          selectedCharacterId = id;
          isTransformMode = false;
          renderProfile();
          showPage("profile");
          return;
        }
      }

      showPage("characters");
    }

    function goToRoute(hash) {
      if (location.hash === hash) {
        applyRoute();
      } else {
        location.hash = hash;
      }
    }

    function renderCharacters() {
      const firstTeam = characterData.filter(character => character.team === 1);
      const secondTeam = characterData.filter(character => character.team === 2);

      characterGridWrap.innerHTML = [firstTeam, secondTeam].map(team => {
        const cardsHtml = team.map(character => `
          <button class="char-card" type="button" onclick="openProfile(${character.id})">
            <div class="char-thumb">
              <img src="${character.thumb}" alt="${character.name} 프로필 사진" />
            </div>
            <div class="char-name">${character.name}</div>
          </button>
        `).join("");

        return `<div class="team-row">${cardsHtml}</div>`;
      }).join("");
    }

    function renderGuide() {
      guideList.innerHTML = defaultGuideItems.map((item, index) => `
        <div class="guide-item">
          <button class="guide-question" type="button" onclick="toggleGuideItem(${index}, this)">
            <span>${item.question}</span>
            <span class="guide-arrow">▼</span>
          </button>
          <div class="guide-answer">${item.answer}</div>
        </div>
      `).join("");
    }

    function renderProfile() {
      const character = getCharacterById(selectedCharacterId);
      if (!character) return;

      const currentProfile = isTransformMode
        ? {
            name: character.transform.name,
            transformName: character.transform.transformName,
            gender: character.gender,
            age: character.age,
            appearance: character.transform.appearance,
            personality: character.transform.personality,
            feature: character.transform.feature,
            body: character.transform.body
          }
        : {
            name: character.name,
            gender: character.gender,
            age: character.age,
            appearance: character.appearance,
            personality: character.personality,
            feature: character.feature,
            body: character.body
          };

      profileBodyImage.src = currentProfile.body;
      profileBodyImage.alt = `${currentProfile.name} 전신 사진`;

      const rows = [
        ["이름", currentProfile.name],
        ...(isTransformMode ? [["변신명", currentProfile.transformName]] : []),
        ["성별", currentProfile.gender],
        ["나이", currentProfile.age],
        ["외관", currentProfile.appearance],
        ["성격", currentProfile.personality],
        ["특징", currentProfile.feature]
      ];

      profileDetailList.innerHTML = rows.map(([label, value]) => `
        <div class="detail-item">
          <div class="detail-label">${label}</div>
          <div class="detail-value">${value}</div>
        </div>
      `).join("");

      transformBtn.textContent = isTransformMode ? "원래대로" : "변신!";
      transformBtn.classList.toggle("active", isTransformMode);
    }

    function openProfile(id) {
      goToRoute(`#character-${id}`);
    }

    function toggleGuideItem(index, buttonEl) {
      const guideItem = buttonEl.closest(".guide-item");
      guideItem.classList.toggle("open");
    }

    tabButtons.forEach(button => {
      button.addEventListener("click", () => {
        const page = button.dataset.page;
        goToRoute(page === "guide" ? "#guide" : "#characters");
      });
    });

    transformBtn.addEventListener("click", () => {
      if (!selectedCharacterId) return;
      isTransformMode = !isTransformMode;
      renderProfile();
    });

    backToListBtn.addEventListener("click", () => {
      if (location.hash.startsWith("#character-") && history.length > 1) {
        history.back();
        setTimeout(() => {
          if (location.hash.startsWith("#character-")) {
            goToRoute("#characters");
          }
        }, 120);
      } else {
        goToRoute("#characters");
      }
    });

    window.addEventListener("hashchange", applyRoute);
    window.openProfile = openProfile;
    window.toggleGuideItem = toggleGuideItem;

    renderCharacters();
    renderGuide();

    if (!location.hash) {
      location.hash = "#characters";
    }
    applyRoute();
  </script>
</body>
</html>
