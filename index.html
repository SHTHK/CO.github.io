<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리 동아리 정상운영 합니다!</title>
  <style>
    :root {
      --bg: #fff6fb;
      --folder: #ffe3f0;
      --folder-border: #ff7db6;
      --paper: #ffffff;
      --paper-line: #f8c8de;
      --paper-margin: #ff9bc7;
      --card: #fffafe;
      --card-border: #f5b8d4;
      --point: #ff2f8a;
      --point-dark: #d9166f;
      --point-light: #ffd6e8;
      --text: #4e2741;
      --text-soft: #7b5770;
      --shadow: 0 14px 28px rgba(255, 47, 138, 0.12);
      --radius-lg: 30px;
      --radius-md: 22px;
      --radius-sm: 16px;
      --header-h: 100px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 12% 16%, rgba(255,255,255,0.95) 0 3px, transparent 4px),
        radial-gradient(circle at 84% 10%, rgba(255,255,255,0.9) 0 3px, transparent 4px),
        radial-gradient(circle at 18% 78%, rgba(255,255,255,0.8) 0 2px, transparent 3px),
        radial-gradient(circle at 76% 68%, rgba(255,255,255,0.8) 0 2px, transparent 3px);
      opacity: 0.85;
    }

    img {
      display: block;
      max-width: 100%;
      filter: none !important;
      image-rendering: auto;
    }

    button {
      font: inherit;
      border: none;
      cursor: pointer;
      background: none;
    }

    .app {
      min-height: 100vh;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .folder {
      position: relative;
      width: min(1400px, 100%);
      min-height: calc(100vh - 48px);
      background: var(--folder);
      border: 3px solid var(--folder-border);
      border-radius: 34px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .folder::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 34px;
      background: rgba(255,255,255,0.35);
      border-right: 3px dashed var(--folder-border);
      pointer-events: none;
      z-index: 0;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 20;
      min-height: var(--header-h);
      padding: 26px 30px 0 54px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      background: transparent;
    }

    .title {
      margin: 0;
      padding-bottom: 18px;
      font-size: clamp(1.8rem, 2.4vw, 2.5rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--point-dark);
      text-shadow:
        2px 2px 0 #fff,
        -1px -1px 0 #fff,
        1px -1px 0 #fff,
        -1px 1px 0 #fff;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      position: relative;
      top: 4px;
    }

    .tab-btn {
      min-width: 138px;
      padding: 15px 18px 18px;
      border-radius: 22px 22px 0 0;
      background: var(--point-light);
      border: 3px solid var(--folder-border);
      border-bottom: none;
      color: var(--point-dark);
      font-weight: 900;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .tab-btn:hover {
      transform: translateY(-3px);
      background: #ffc4dc;
    }

    .tab-btn.active {
      background: var(--paper);
      color: var(--point-dark);
      border-color: var(--point);
      padding-bottom: 22px;
    }

    .content {
      position: relative;
      z-index: 1;
      padding: 0 24px 24px 54px;
    }

    .page {
      display: none;
      animation: fadeIn 0.18s ease;
    }

    .page.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .paper {
      position: relative;
      min-height: calc(100vh - var(--header-h) - 86px);
      padding: 34px;
      border-radius: 0 var(--radius-lg) var(--radius-lg) var(--radius-lg);
      border: 3px solid var(--point);
      background:
        repeating-linear-gradient(
          180deg,
          transparent 0,
          transparent 37px,
          var(--paper-line) 37px,
          var(--paper-line) 38px
        ),
        var(--paper);
      box-shadow: 6px 6px 0 rgba(255, 47, 138, 0.08);
    }

    .paper::before {
      content: "";
      position: absolute;
      left: 34px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--paper-margin);
      pointer-events: none;
    }

    .paper::after {
      content: "★";
      position: absolute;
      right: 20px;
      bottom: 14px;
      color: #ff7db6;
      font-size: 1.7rem;
      opacity: 0.65;
      pointer-events: none;
    }

    .character-grid-wrap {
      display: grid;
      gap: 30px;
    }

    .team-section {
      display: grid;
      gap: 16px;
      padding: 18px 18px 20px;
      border: 2px dashed var(--card-border);
      border-radius: 24px;
      background: #fffafe;
    }

    .team-section + .team-section {
      margin-top: 6px;
    }

    .team-heading {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 10px;
      border-bottom: 2px solid #f7d3e3;
    }

    .team-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 84px;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--point);
      color: #fff;
      font-weight: 900;
      letter-spacing: 0.04em;
    }

    .team-name {
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--point-dark);
      letter-spacing: -0.02em;
    }

    .team-row {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 18px;
    }

    .char-card {
      position: relative;
      min-width: 0;
      padding: 14px;
      border-radius: var(--radius-md);
      background: var(--card);
      border: 2px solid var(--card-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 0 #ffe6f1;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .char-card::before {
      content: "★";
      position: absolute;
      top: -10px;
      right: -8px;
      font-size: 1rem;
      color: #ff7db6;
      opacity: 0;
      transform: scale(0.6);
      transition: 0.18s ease;
    }

    .char-card:hover {
      transform: translateY(-5px);
      border-color: var(--point);
      box-shadow: 0 10px 0 #ffc8df;
    }

    .char-card:hover::before {
      opacity: 1;
      transform: scale(1);
    }

    .char-thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
      border: 2px dashed #f1b3cf;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .char-thumb img,
    .profile-visual img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #fff;
    }

    .char-name {
      width: 100%;
      text-align: center;
      font-weight: 900;
      font-size: 1rem;
      color: var(--point-dark);
      background: #ffe9f3;
      border-radius: 12px;
      padding: 7px 8px;
      word-break: keep-all;
      line-height: 1.35;
    }

    .profile-page-inner {
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
      gap: 30px;
      align-items: start;
    }

    .profile-side {
      position: sticky;
      top: calc(var(--header-h) + 36px);
      display: grid;
      gap: 16px;
    }

    .back-btn {
      align-self: flex-start;
      padding: 11px 18px;
      border-radius: 999px;
      background: #fff;
      color: var(--point-dark);
      border: 2px solid var(--folder-border);
      font-weight: 900;
      box-shadow: 0 4px 0 #ffc1dc;
    }

    .back-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #ffc1dc;
    }

    .profile-visual-card {
      background: #fff;
      border: 3px solid var(--point);
      border-radius: 28px;
      padding: 18px;
      box-shadow: 6px 6px 0 rgba(255, 47, 138, 0.08);
    }

    .profile-visual {
      width: 100%;
      aspect-ratio: 2 / 3;
      border-radius: 18px;
      overflow: hidden;
      background: #fff;
      border: 2px dashed #f1b3cf;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .transform-btn {
      width: 100%;
      margin-top: 16px;
      padding: 15px 16px;
      border-radius: 18px;
      background: var(--point);
      color: #fff;
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      box-shadow: 0 8px 20px rgba(255, 47, 138, 0.18);
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .transform-btn:hover {
      transform: scale(1.02);
      background: var(--point-dark);
    }

    .transform-btn.active {
      background: #ff5fa6;
    }

    .profile-detail-card {
      min-width: 0;
      background: rgba(255,255,255,0.95);
      border: 2px solid var(--card-border);
      border-radius: 28px;
      padding: 24px;
    }

    .profile-detail-list {
      display: grid;
      gap: 14px;
    }

    .detail-item {
      display: grid;
      grid-template-columns: 108px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
      padding: 14px 0;
      border-bottom: 2px dashed #f8d2e2;
    }

    .detail-item:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-weight: 900;
      color: #fff;
      background: var(--point);
      padding: 6px 12px;
      border-radius: 12px;
      text-align: center;
    }

    .detail-value {
      min-width: 0;
      white-space: pre-wrap;
      word-break: keep-all;
      line-height: 1.8;
      color: var(--text);
      font-weight: 700;
      padding-top: 2px;
    }

    .guide-wrap {
      display: grid;
      gap: 26px;
    }

    .section-title {
      margin: 0;
      font-size: 1.45rem;
      font-weight: 900;
      color: var(--point-dark);
      padding-bottom: 8px;
      border-bottom: 2px dashed #f2bfd6;
    }

    .guide-list,
    .reference-list {
      display: grid;
      gap: 14px;
    }

    .guide-item,
    .reference-item {
      background: #fff;
      border: 2px solid var(--card-border);
      border-radius: 22px;
      box-shadow: 0 4px 0 #ffe6f1;
    }

    .guide-question {
      width: 100%;
      padding: 18px 20px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      text-align: left;
      font-weight: 900;
      font-size: 1.05rem;
      color: var(--point-dark);
      background: transparent;
    }

    .guide-question .q-text::before {
      content: "Q. ";
      color: var(--point);
    }

    .guide-arrow {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #ffe7f2;
      color: var(--point-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease;
    }

    .guide-item.open .guide-arrow {
      transform: rotate(90deg);
      background: var(--point);
      color: #fff;
    }

    .guide-answer {
      display: none;
      padding: 0 20px 20px;
      color: var(--text-soft);
      line-height: 1.8;
      white-space: pre-wrap;
      font-weight: 700;
    }

    .guide-item.open .guide-answer {
      display: block;
    }

    .reference-item {
      padding: 20px;
      line-height: 1.8;
      white-space: pre-wrap;
      font-weight: 700;
      color: var(--text);
      word-break: keep-all;
    }

    @media (max-width: 1200px) {
      .team-row {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .profile-page-inner {
        grid-template-columns: 1fr;
      }

      .profile-side {
        position: static;
      }
    }

    @media (max-width: 760px) {
      .app {
        padding: 12px;
      }

      .folder::before {
        width: 20px;
      }

      .header {
        padding: 20px 16px 0 30px;
        flex-direction: column;
        align-items: flex-start;
      }

      .content {
        padding: 0 14px 14px 30px;
      }

      .paper {
        padding: 22px 18px;
        border-radius: 0 18px 18px 18px;
      }

      .paper::before {
        left: 18px;
      }

      .team-section {
        padding: 14px;
      }

      .team-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .detail-item {
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 14px;
        border-radius: 14px;
        border-bottom: none;
        background: #fff8fc;
      }

      .tab-btn {
        min-width: 112px;
        padding: 12px 14px 15px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="folder">
      <header class="header">
        <h1 class="title">우리 동아리 정상운영 합니다!</h1>
        <nav class="tabs">
          <button class="tab-btn active" data-target="charactersPage" type="button">캐릭터 소개</button>
          <button class="tab-btn" data-target="guidePage" type="button">플레이 안내</button>
        </nav>
      </header>

      <main class="content">
        <section class="page active" id="charactersPage">
          <div class="paper">
            <div class="character-grid-wrap" id="characterGridWrap"></div>
          </div>
        </section>

        <section class="page" id="profilePage">
          <div class="paper">
            <div class="profile-page-inner">
              <div class="profile-side">
                <button class="back-btn" id="backBtn" type="button">← 뒤로가기</button>

                <div class="profile-visual-card">
                  <div class="profile-visual">
                    <img id="profileBodyImage" src="" alt="캐릭터 전신 사진" />
                  </div>
                  <button class="transform-btn" id="transformBtn" type="button">변신!</button>
                </div>
              </div>

              <div class="profile-detail-card">
                <div class="profile-detail-list" id="profileDetailList"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="page" id="guidePage">
          <div class="paper">
            <div class="guide-wrap">
              <h2 class="section-title">문제가 생겼어요!</h2>
              <div class="guide-list" id="guideList"></div>

              <h2 class="section-title">참고하면 좋은 것들</h2>
              <div class="reference-list" id="referenceList"></div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

    const qnaItems = [
      {
        question: "이 홈페이지는 어떻게 보나요?",
        answer: "첫번째 인덱스에서는 캐릭터를 고를 수 있고, 두번째 인덱스에서는 플레이 가이드를 볼 수 있습니다."
      },
      {
        question: "캐릭터 프로필은 어디서 열 수 있나요?",
        answer: "캐릭터 선택 화면에서 원하는 캐릭터의 사진이나 이름이 들어간 카드를 누르면 전체 페이지 프로필 화면으로 이동합니다."
      },
      {
        question: "변신 버튼은 어떤 기능인가요?",
        answer: "프로필 화면의 변신! 버튼을 누르면 변신 버전 프로필로 바뀌고, 다시 누르면 기본 상태로 돌아옵니다."
      }
    ];

    const referenceItems = [
      "이곳에 동아리원들이 알아야 할 추가적인 참고 사항이나 규칙 등을 자유롭게 적을 수 있습니다.",
      "새로운 참고 항목을 추가하고 싶다면 referenceItems 배열에 내용을 추가하세요."
    ];

    const pageEls = document.querySelectorAll(".page");
    const tabBtns = document.querySelectorAll(".tab-btn");
    const characterGridWrap = document.getElementById("characterGridWrap");
    const profileBodyImage = document.getElementById("profileBodyImage");
    const profileDetailList = document.getElementById("profileDetailList");
    const transformBtn = document.getElementById("transformBtn");
    const backBtn = document.getElementById("backBtn");
    const guideList = document.getElementById("guideList");
    const referenceList = document.getElementById("referenceList");

    let selectedCharacterId = null;
    let isTransformMode = false;

    function getCharacterById(id) {
      return characterData.find(character => character.id === id);
    }

    function showPage(pageId) {
      pageEls.forEach(page => {
        page.classList.toggle("active", page.id === pageId);
      });

      tabBtns.forEach(btn => {
        const isCharacterTabActive =
          pageId === "charactersPage" || pageId === "profilePage";
        const shouldActivate =
          (btn.dataset.target === "charactersPage" && isCharacterTabActive) ||
          btn.dataset.target === pageId;

        btn.classList.toggle("active", shouldActivate);
      });

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function setRoute(hash) {
      if (location.hash === hash) {
        syncFromHash();
        return;
      }
      location.hash = hash;
    }

    function syncFromHash() {
      const hash = location.hash || "#characters";

      if (hash.startsWith("#character-")) {
        const id = Number(hash.replace("#character-", ""));
        const character = getCharacterById(id);

        if (character) {
          selectedCharacterId = id;
          isTransformMode = false;
          renderProfile();
          showPage("profilePage");
          return;
        }
      }

      if (hash === "#guide") {
        showPage("guidePage");
        return;
      }

      showPage("charactersPage");
    }

    function renderTeamSection(teamLabel, teamName, teamMembers) {
      const cards = teamMembers.map(character => `
        <button class="char-card" type="button" onclick="openProfile(${character.id})">
          <div class="char-thumb">
            <img src="${character.thumb}" alt="${character.name} 프로필 사진" />
          </div>
          <div class="char-name">${character.name}</div>
        </button>
      `).join("");

      return `
        <section class="team-section">
          <div class="team-heading">
            <span class="team-badge">${teamLabel}</span>
            <span class="team-name">${teamName}</span>
          </div>
          <div class="team-row">${cards}</div>
        </section>
      `;
    }

    function renderCharacters() {
      const team1 = characterData.filter(item => item.team === 1);
      const team2 = characterData.filter(item => item.team === 2);

      characterGridWrap.innerHTML = [
        renderTeamSection("1팀", "GLOSS", team1),
        renderTeamSection("2팀", "FANG", team2)
      ].join("");
    }

    function openProfile(id) {
      setRoute(`#character-${id}`);
    }

    function toggleTransform() {
      if (!selectedCharacterId) return;
      isTransformMode = !isTransformMode;
      renderProfile();
    }

    function renderProfile() {
      const character = getCharacterById(selectedCharacterId);
      if (!character) return;

      const current = isTransformMode
        ? {
            label: "변신명",
            mainName: character.transform.transformName,
            gender: character.gender,
            age: character.age,
            personality: character.transform.personality,
            feature: character.transform.feature,
            body: character.transform.body
          }
        : {
            label: "이름",
            mainName: character.name,
            gender: character.gender,
            age: character.age,
            personality: character.personality,
            feature: character.feature,
            body: character.body
          };

      profileBodyImage.src = current.body;
      profileBodyImage.alt = `${current.mainName} 전신 사진`;

      const detailRows = [
        [current.label, current.mainName],
        ["성별", current.gender],
        ["나이", current.age],
        ["성격", current.personality],
        ["특징", current.feature]
      ];

      profileDetailList.innerHTML = detailRows.map(([label, value]) => `
        <div class="detail-item">
          <div class="detail-label">${label}</div>
          <div class="detail-value">${value}</div>
        </div>
      `).join("");

      transformBtn.classList.toggle("active", isTransformMode);
      transformBtn.textContent = isTransformMode ? "원래대로" : "변신!";
    }

    function renderGuide() {
      guideList.innerHTML = qnaItems.map((item, index) => `
        <div class="guide-item">
          <button class="guide-question" type="button" onclick="toggleGuideItem(${index}, this)">
            <span class="q-text">${item.question}</span>
            <span class="guide-arrow">▶</span>
          </button>
          <div class="guide-answer">${item.answer}</div>
        </div>
      `).join("");

      referenceList.innerHTML = referenceItems.map(item => `
        <div class="reference-item">${item}</div>
      `).join("");
    }

    function toggleGuideItem(index, buttonEl) {
      const guideItem = buttonEl.closest(".guide-item");
      guideItem.classList.toggle("open");
    }

    tabBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        const targetHash = btn.dataset.target === "guidePage"
          ? "#guide"
          : "#characters";
        setRoute(targetHash);
      });
    });

    backBtn.addEventListener("click", () => {
      if (location.hash.startsWith("#character-") && history.length > 1) {
        history.back();

        setTimeout(() => {
          if (location.hash.startsWith("#character-")) {
            setRoute("#characters");
          }
        }, 120);
      } else {
        setRoute("#characters");
      }
    });

    transformBtn.addEventListener("click", toggleTransform);
    window.addEventListener("hashchange", syncFromHash);

    window.openProfile = openProfile;
    window.toggleGuideItem = toggleGuideItem;

    renderCharacters();
    renderGuide();

    if (!location.hash) {
      location.hash = "#characters";
    }
    syncFromHash();
  </script>
