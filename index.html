<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리 동아리 정상운영 합니다!</title>
  <style>
    :root {
      
      --bg-gradient: linear-gradient(135deg, #ffe6f2 0%, #e6e6ff 50%, #e6f9ff 100%);
      --folder-cover: #ffd1dc;
      --folder-border: #ff85a2;
      --paper: #ffffff;
      --line: #ffe0eb; /* 노트 선 */
      --ink: #5c3a6b; /* 텍스트 */
      --point: #ff549a;
      --point-dark: #cc0066;
      --accent: #ffcc00;
      --magic-blue: #66ccff;
      --shadow: 0 16px 40px rgba(255, 102, 178, 0.25);
      --radius: 32px;
      --radius-sm: 20px;
      --header-h: 100px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", "Comic Sans MS", sans-serif;
      color: var(--ink);
      background: var(--bg-gradient);
      /* 배경 패턴 */
      background-image: radial-gradient(#fff 15%, transparent 16%), radial-gradient(#fff 15%, transparent 16%);
      background-size: 30px 30px;
      background-position: 0 0, 15px 15px;
    }

    button, input, textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: none;
      background: none;
    }

    .app {
      min-height: 100vh;
      padding: 30px;
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    /* 바인더 외곽 */
    .folder {
      position: relative;
      width: min(1400px, 100%);
      min-height: calc(100vh - 60px);
      background: var(--folder-cover);
      border: 4px solid var(--folder-border);
      border-radius: 36px;
      box-shadow: 
        inset 0 0 0 8px rgba(255, 255, 255, 0.5), /* 바인더 안쪽 테두리 */
        var(--shadow);
      overflow: hidden;
    }

    /* 서류철 링 */
    .folder::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 40px;
      background: rgba(255,255,255,0.4);
      border-right: 4px dashed var(--folder-border);
      z-index: 10;
    }

    .titlebar {
      position: sticky;
      top: 0;
      z-index: 20;
      min-height: var(--header-h);
      padding: 30px 40px 0px 60px; /* 왼쪽 바인더 링 피해서 패딩 */
      background: transparent;
      display: flex;
      align-items: flex-end; /* 탭이 바닥에 붙도록 */
      justify-content: space-between;
      gap: 20px;
    }

    h1 {
      margin: 0;
      padding-bottom: 20px;
      font-size: clamp(1.8rem, 2.5vw, 2.6rem);
      letter-spacing: -0.02em;
      font-weight: 900;
      color: var(--point);
      text-shadow: 
        3px 3px 0px #fff, 
        -1px -1px 0px #fff,  
        1px -1px 0px #fff,
        -1px 1px 0px #fff,
        1px 1px 0px #fff;
    }

    .index-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      position: relative;
      top: 4px; /* 종이와 겹치게 */
    }

    /* 서류철 인덱스 탭 디자인 */
    .tab-btn {
      min-width: 140px;
      padding: 16px 20px 20px;
      border-radius: 24px 24px 0 0;
      background: #ffb3c6;
      border: 4px solid var(--folder-border);
      border-bottom: none;
      color: #fff;
      font-weight: 900;
      font-size: 1.1rem;
      text-shadow: 1px 1px 0 var(--folder-border);
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .tab-btn:hover {
      background: #ff99b3;
      transform: translateY(-4px);
    }

    .tab-btn.active {
      background: var(--paper);
      color: var(--point);
      border-color: var(--point);
      text-shadow: none;
      padding-bottom: 24px;
      z-index: 2;
    }

    .content {
      padding: 0 30px 30px 60px;
      position: relative;
      z-index: 1;
    }

    .page {
      display: none;
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .page.active {
      display: block;
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.98) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* 다이어리 속지 느낌 */
    .paper {
      position: relative;
      background: 
        repeating-linear-gradient(
          180deg,
          transparent 0,
          transparent 39px,
          var(--line) 39px,
          var(--line) 40px
        ),
        var(--paper);
      background-position: 0 10px;
      border: 4px solid var(--point);
      border-radius: 0 var(--radius) var(--radius) var(--radius);
      padding: 40px;
      min-height: calc(100vh - var(--header-h) - 90px);
      box-shadow: 6px 6px 0px rgba(255, 102, 178, 0.2);
    }

    .paper::after {
      content: "★";
      position: absolute;
      bottom: 20px;
      right: 20px;
      color: var(--accent);
      font-size: 2rem;
      text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
    }

    .character-grid-wrap {
      display: grid;
      gap: 30px;
    }

    .team-row {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 24px;
    }

    /* 캐릭터 카드 */
    .char-card {
      position: relative;
      background: #fff;
      border: 3px solid #ffd1dc;
      border-radius: var(--radius-sm);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 8px 0 #ffe6f2;
    }

    .char-card::before {
      content: "⭐";
      position: absolute;
      top: -12px;
      right: -12px;
      font-size: 1.5rem;
      filter: drop-shadow(0 2px 4px rgba(255,204,0,0.4));
      z-index: 2;
      opacity: 0;
      transform: scale(0);
      transition: all 0.2s ease;
    }

    .char-card:hover {
      transform: translateY(-8px) rotate(-2deg);
      border-color: var(--point);
      box-shadow: 0 12px 0 #ffb3c6;
    }

    .char-card:hover::before {
      opacity: 1;
      transform: scale(1) rotate(15deg);
    }

    .char-thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      overflow: hidden;
      background: #fdf5ff;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed #ffb3c6;
    }

    .char-thumb img,
    .profile-visual img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #ffffff;
      display: block;
      filter: none !important;
      image-rendering: auto;
    }

    .char-name {
      width: 100%;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--point-dark);
      background: #ffe6f2;
      padding: 6px 0;
      border-radius: 12px;
      word-break: keep-all;
    }

    .profile-page-inner {
      display: grid;
      grid-template-columns: minmax(320px, 430px) minmax(0, 1fr);
      gap: 36px;
      align-items: start;
    }

    .profile-side {
      position: sticky;
      top: calc(var(--header-h) + 40px);
      display: grid;
      gap: 20px;
    }

    .back-btn {
      align-self: flex-start;
      padding: 12px 24px;
      border-radius: 999px;
      background: #fff;
      border: 3px solid var(--folder-border);
      color: var(--point);
      font-weight: 900;
      box-shadow: 0 4px 0 var(--folder-border);
      transition: transform 0.1s;
    }
    .back-btn:active {
      transform: translateY(4px);
      box-shadow: 0 0 0 var(--folder-border);
    }

    .profile-visual-card {
      background: #fff;
      border: 4px solid var(--point);
      border-radius: 32px;
      padding: 24px;
      box-shadow: 8px 8px 0px rgba(255, 84, 154, 0.2);
    }

    .profile-visual {
      width: 100%;
      aspect-ratio: 2 / 3;
      border-radius: 20px;
      overflow: hidden;
      background: #fdf5ff;
      border: 3px dashed #ffb3c6;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 변신 버튼 - 단색 처리 */
    .transform-btn {
      width: 100%;
      margin-top: 20px;
      padding: 18px 16px;
      border-radius: 20px;
      background: var(--point);
      color: #fff;
      font-weight: 900;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      border: 3px solid #fff;
      box-shadow: 0 8px 24px rgba(255, 84, 154, 0.4);
      text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
      transition: all 0.2s ease;
    }
    .transform-btn:hover {
      transform: scale(1.03);
      background: var(--point-dark);
    }
    .transform-btn:active {
      transform: scale(0.95);
    }

    .transform-btn.active {
      background: var(--magic-blue);
      box-shadow: 0 8px 24px rgba(102, 204, 255, 0.4);
    }
    .transform-btn.active:hover {
      background: #3399ff;
    }

    .profile-detail-card {
      background: rgba(255, 255, 255, 0.9);
      border: 3px solid #ffb3c6;
      border-radius: 32px;
      padding: 30px;
      box-shadow: inset 0 0 20px #fff5f8;
      min-width: 0;
    }

    .profile-detail-list {
      display: grid;
      gap: 16px;
    }

    .detail-item {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 20px;
      align-items: start;
      padding: 18px 0;
      border-bottom: 2px dashed #ffcce0;
    }

    .detail-item:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-weight: 900;
      color: #fff;
      background: var(--point);
      padding: 6px 16px;
      border-radius: 12px;
      text-align: center;
      transform: rotate(-2deg);
    }

    .detail-value {
      min-width: 0;
      white-space: pre-wrap;
      line-height: 1.8;
      word-break: keep-all;
      font-weight: 700;
      padding-top: 4px;
    }

    /* 가이드(QnA) 섹션 */
    .guide-wrap {
      display: grid;
      gap: 30px;
    }
    
    .section-title {
      margin: 0;
      font-size: 1.6rem;
      color: var(--point-dark);
      font-weight: 900;
      padding-bottom: 10px;
      border-bottom: 3px dashed #ffcce0;
    }

    .guide-list {
      display: grid;
      gap: 16px;
    }

    .guide-item {
      background: #fff;
      border: 3px solid #ffd1dc;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 4px 0 #ffe6f2;
      transition: all 0.2s ease;
    }
    .guide-item:hover {
      border-color: var(--point);
    }

    .guide-question {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      padding: 20px 24px;
      text-align: left;
      font-weight: 900;
      font-size: 1.1rem;
      color: var(--point-dark);
      background: transparent;
    }

    .guide-question span:first-child::before {
      content: "Q. ";
      color: var(--point);
    }

    .guide-question span:last-child {
      font-size: 1.2rem;
      color: var(--point);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      background: #ffe6f2;
      border-radius: 50%;
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
    }

    .guide-item.open .guide-question span:last-child {
      transform: rotate(90deg);
      background: var(--point);
      color: #fff;
    }

    .guide-answer {
      display: none;
      padding: 0 24px 24px;
      line-height: 1.8;
      white-space: pre-wrap;
      color: var(--ink);
      font-weight: 700;
    }
    
    .guide-item.open .guide-answer {
      display: block;
      animation: fadeInDown 0.3s ease;
    }

    /* 참고하면 좋은 것들 섹션 */
    .reference-list {
      display: grid;
      gap: 16px;
    }
    .reference-item {
      background: #fff;
      border: 3px solid #ffd1dc;
      border-radius: 24px;
      box-shadow: 0 4px 0 #ffe6f2;
      padding: 24px;
      line-height: 1.8;
      white-space: pre-wrap;
      color: var(--ink);
      font-weight: 700;
      font-size: 1.05rem;
      word-break: keep-all;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 1200px) {
      .team-row { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .profile-page-inner { grid-template-columns: 1fr; }
      .profile-side { position: static; }
    }

    @media (max-width: 760px) {
      .app { padding: 16px; }
      .folder { border-radius: 24px; }
      .folder::before { width: 20px; }
      .titlebar { padding: 24px 20px 0px 30px; align-items: flex-start; flex-direction: column; }
      .content { padding: 0 16px 16px 30px; }
      .paper { padding: 24px 20px; border-radius: 0 16px 16px 16px; }
      .team-row { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
      .detail-item { grid-template-columns: 1fr; gap: 8px; border-bottom: none; background: #fdf5ff; padding: 16px; border-radius: 16px; }
      .detail-label { align-self: flex-start; transform: none; }
      .tab-btn { min-width: 110px; padding: 12px 16px 16px; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="folder">
      <header class="titlebar">
        <h1>우리 동아리 정상운영 합니다!</h1>
        <nav class="index-tabs">
          <button class="tab-btn active" data-target="charactersPage">캐릭터 소개</button>
          <button class="tab-btn" data-target="guidePage">플레이 안내</button>
        </nav>
      </header>

      <main class="content">
        <section class="page active" id="charactersPage">
          <div class="paper">
            <div class="character-grid-wrap" id="characterGridWrap"></div>
          </div>
        </section>

        <section class="page" id="profilePage">
          <div class="paper">
            <div class="profile-page-inner">
              <div class="profile-side">
                <button class="back-btn" type="button" onclick="history.back()">← BACK</button>
                <div class="profile-visual-card">
                  <div class="profile-visual">
                    <img id="profileBodyImage" src="" alt="캐릭터 전신 사진" />
                  </div>
                  <button class="transform-btn" id="transformBtn">변신!</button>
                </div>
              </div>

              <div class="profile-detail-card">
                <div class="profile-detail-list" id="profileDetailList"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="page" id="guidePage">
          <div class="paper">
            <div class="guide-wrap">
              <h2 class="section-title">문제가 생겼어요!</h2>
              <div class="guide-list" id="guideList"></div>

              <h2 class="section-title" style="margin-top: 20px;">참고하면 좋은 것들</h2>
              <div class="reference-list" id="referenceList"></div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>
    /*
      ==========================
      수정이 쉬운 구간
      1) characterData 안의 텍스트/이미지 경로를 바꾸면 캐릭터 정보가 바뀝니다.
      2) qnaItems: 클릭하면 펼쳐지는 질문과 답변을 추가/수정하세요.
      3) referenceItems: 맨 밑에 길게 보여줄 참고사항을 추가/수정하세요.
      ==========================
    */

    function makePlaceholder(label, ratio = "square") {
      const width = ratio === "portrait" ? 800 : 800;
      const height = ratio === "portrait" ? 1200 : 800;
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
          <rect width="100%" height="100%" fill="#ffffff"/>
          <rect x="28" y="28" width="${width - 56}" height="${height - 56}" rx="24" fill="#f4efe7" stroke="#496b9f" stroke-width="4" stroke-dasharray="10 10"/>
          <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" font-size="42" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" fill="#496b9f" font-weight="700">${label}</text>
        </svg>
      `;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    const characterData = [
      { id: 1, team: 1, name: "이강혁", gender: "남", age: "19", appearance: "153cm. GLOSS의 최단신. 본래 귀여운 인상이지만 의도적으로 항상 미간을 찌푸리고 다닌다.", personality: "팀을 먹여 살리기 위해 일하는 가장 느낌이다. 물론 다른 팀원들도 열심히 하고 있긴 하지만. 다혈질에 직설적이다. ", feature: "항상 자신이 '마법소년'임을 강조한다. 마법소녀로 착각받으면 짜증나한다.", thumb: 'KHB_tn.png', body: 'KHB_wl_coyboyshot.png', transform: { transformName: "매지컬 앤젤 핑크", name: "매지컬 앤젤 핑크", appearance: "변신 후에는 찌푸린 인상을 풀고 있다. 그러지 않으면 경고장이 날아올테니까...", personality: "마법소녀의 정석. 명랑하고 상냥하다. 물론 다 연기 중인 성격이다.", feature: "최단신에 귀엽다는 이유로 후원기업에서 귀여운 컨셉을 강제했다. 상징적 인물이 필요하기 때문이라고 한다.", body: 'KHA_wl_coyboyshot.png' } },
      { id: 2, team: 1, name: "유하나", gender: "여", age: "18", appearance: "177cm. 여성 평균 키에 비해 매우 큰 편. 우주와 더불어 팀에서 교복을 열심히 챙겨 입는 사람들 중 한 명.", personality: "매우 소심하고 내향적이다. 공감 능력이 뛰어나다.", feature: "변신 후에 한 말들 때문에 자주 이불킥을 하고 있다.", thumb: 'HNB_tn.png', body: 'HNB_wl_cowboyshot.png', transform: { transformName: "매지컬 노블 블랙", name: "매지컬 노블 블랙", appearance: "여기에 변신 후 외관 설명을 입력하세요.", personality: "나르시시즘의 끝판왕. 여유롭고 능글맞다. 겉으로는.", feature: "키가 크다는 이유로 후원기업에서 왕자님 컨셉을 강제했다. 팬 유입이 꽤 잘 되는 모양이다.", body: 'HNA_wl_coyboyshot.png } },

        answer: "첫번째 인덱스에서는 캐릭터를 고를 수 있고, 두번째 인덱스에서는 플레이 가이드를 볼 수 있습니다."
      },
      {
        question: "캐릭터 프로필은 어디서 열 수 있나요?",
        answer: "캐릭터 선택 화면에서 원하는 캐릭터의 사진이나 이름이 들어간 카드를 누르면 전체 페이지 프로필 화면으로 이동합니다."
      },

        question: "변신 버튼은 어떤 기능인가요?",

      }
    ];

      "새로운 참고 항목을 추가하고 싶다면 코드의 referenceItems 배열에 내용을 추가해 주세요."
    ];

    const pageEls = document.querySelectorAll(".page");
    const tabBtns = document.querySelectorAll(".tab-btn");
    const characterGridWrap = document.getElementById("characterGridWrap");
    const transformBtn = document.getElementById("transformBtn");
    const profileBodyImage = document.getElementById("profileBodyImage");
    const profileDetailList = document.getElementById("profileDetailList");
    const guideList = document.getElementById("guideList");
    const referenceList = document.getElementById("referenceList");

    let selectedCharacterId = null;
    let isTransformMode = false;

    function getCharacterById(id) {
      return characterData.find(character => character.id === id);
    }

    function showPage(pageId) {
      pageEls.forEach(page => page.classList.toggle("active", page.id === pageId));
      tabBtns.forEach(btn => btn.classList.toggle("active", btn.dataset.target === pageId || (pageId === "profilePage" && btn.dataset.target === "charactersPage")));
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function setRoute(hash) {
      if (location.hash === hash) {
        syncFromHash();
        return;
      }
      location.hash = hash;
    }

    function syncFromHash() {
      const hash = location.hash || "#characters";

      if (hash.startsWith("#character-")) {
        const id = Number(hash.replace("#character-", ""));
        const character = getCharacterById(id);
        if (character) {
          selectedCharacterId = id;
          isTransformMode = false;
          renderProfile();
          showPage("profilePage");
          return;
        }
      }

      if (hash === "#guide") {
        showPage("guidePage");
        return;
      }

      showPage("charactersPage");
    }

    function renderCharacters() {
      const team1 = characterData.filter(item => item.team === 1);
      const team2 = characterData.filter(item => item.team === 2);

      characterGridWrap.innerHTML = [team1, team2].map(team => {
        const cards = team.map(character => `
          <button class="char-card" type="button" onclick="openProfile(${character.id})">
            <div class="char-thumb">
              <img src="${character.thumb}" alt="${character.name} 프로필 사진" />
            </div>
            <div class="char-name">${character.name}</div>
          </button>
        `).join("");

        return `<div class="team-row">${cards}</div>`;
      }).join("");
    }

    function openProfile(id) {
      setRoute(`#character-${id}`);
    }

function renderProfile() {
      const character = getCharacterById(selectedCharacterId);
      if (!character) return;

      const current = isTransformMode ? {
        name: character.transform.name, 
        gender: character.gender,
        age: character.age,
        personality: character.transform.personality,
        feature: character.transform.feature,
        body: character.transform.body 
      } : {
        name: character.name,
        gender: character.gender,
        age: character.age,
        personality: character.personality,
        feature: character.feature,
        body: character.body
      };

      profileBodyImage.src = current.body;
      profileBodyImage.alt = `${current.name} 전신 사진`;

      // '외관' 줄을 삭제했어! 이제 이름, 성별, 나이, 성격, 특징만 나와.
      const detailRows = [
        ["이름", current.name], 
        ["성별", current.gender],
        ["나이", current.age],
        ["성격", current.personality],
        ["특징", current.feature]
      ];

      profileDetailList.innerHTML = detailRows.map(([label, value]) => `
        <div class="detail-item">
          <div class="detail-label">${label}</div>
          <div class="detail-value">${value}</div>
        </div>
      `).join("");

      transformBtn.classList.toggle("active", isTransformMode);
      transformBtn.textContent = isTransformMode ? "원래대로" : "변신!";
    }

    function renderGuide() {
      // 자주 묻는 질문 렌더링
      guideList.innerHTML = qnaItems.map((item) => `
        <div class="guide-item">
          <button type="button" class="guide-question" onclick="toggleGuideItem(this)">
            <span>${item.question}</span>
            <span>▶</span>
          </button>
          <div class="guide-answer">${item.answer}</div>
        </div>
      `).join("");

      // 참고하면 좋은 것들 렌더링
      referenceList.innerHTML = referenceItems.map(content => `
        <div class="reference-item">
          ${content}
        </div>
      `).join("");
    }

    function toggleGuideItem(buttonEl) {
      const item = buttonEl.closest(".guide-item");
      item.classList.toggle("open");
    }

    tabBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        const targetHash = btn.dataset.target === "guidePage" ? "#guide" : "#characters";
        setRoute(targetHash);
      });
    });

    window.addEventListener("hashchange", syncFromHash);
    transformBtn.addEventListener("click", toggleTransform);

    renderCharacters();
    renderGuide();
    
    if (!location.hash) {
      location.hash = "#characters";
    } else {
      syncFromHash();
    }

    window.openProfile = openProfile;
    window.toggleGuideItem = toggleGuideItem;
  </script>
