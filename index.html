<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리 동아리 정상운영 합니다!</title>
  <style>
    :root {
      /* 마법소녀/소년 느낌의 통통 튀는 파스텔 컬러 팔레트 */
      --bg-gradient: linear-gradient(135deg, #ffe6f2 0%, #e6e6ff 50%, #e6f9ff 100%);
      --folder-cover: #ffd1dc; /* 딸기우유 핑크 */
      --folder-border: #ff85a2; /* 진한 핑크 테두리 */
      --paper: #ffffff;
      --line: #ffe0eb; /* 귀여운 핑크색 노트 선 */
      --ink: #5c3a6b; /* 너무 까맣지 않은 부드러운 보라빛 텍스트 */
      --point: #ff549a; /* 마법의 핫핑크 */
      --point-dark: #cc0066;
      --accent: #ffcc00; /* 반짝이는 별빛 옐로우 */
      --magic-blue: #66ccff; /* 마법소년 느낌 스카이블루 */
      --shadow: 0 16px 40px rgba(255, 102, 178, 0.25);
      --radius: 32px;
      --radius-sm: 20px;
      --header-h: 100px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", "Comic Sans MS", sans-serif;
      color: var(--ink);
      background: var(--bg-gradient);
      /* 귀여운 땡땡이 배경 패턴 추가 */
      background-image: radial-gradient(#fff 15%, transparent 16%), radial-gradient(#fff 15%, transparent 16%);
      background-size: 30px 30px;
      background-position: 0 0, 15px 15px;
    }

    button, input, textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: none;
      background: none;
    }

    .app {
      min-height: 100vh;
      padding: 30px;
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    /* 서류철(바인더) 외곽 */
    .folder {
      position: relative;
      width: min(1400px, 100%);
      min-height: calc(100vh - 60px);
      background: var(--folder-cover);
      border: 4px solid var(--folder-border);
      border-radius: 36px;
      box-shadow: 
        inset 0 0 0 8px rgba(255, 255, 255, 0.5), /* 바인더 안쪽 테두리 */
        var(--shadow);
      overflow: hidden;
    }

    /* 서류철 링 느낌 */
    .folder::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 40px;
      background: rgba(255,255,255,0.4);
      border-right: 4px dashed var(--folder-border);
      z-index: 10;
    }

    .titlebar {
      position: sticky;
      top: 0;
      z-index: 20;
      min-height: var(--header-h);
      padding: 30px 40px 0px 60px; /* 왼쪽 바인더 링 피해서 패딩 */
      background: transparent;
      display: flex;
      align-items: flex-end; /* 탭이 바닥에 붙도록 */
      justify-content: space-between;
      gap: 20px;
    }

    h1 {
      margin: 0;
      padding-bottom: 20px;
      font-size: clamp(1.8rem, 2.5vw, 2.6rem);
      letter-spacing: -0.02em;
      font-weight: 900;
      color: var(--point);
      text-shadow: 
        3px 3px 0px #fff, 
        -1px -1px 0px #fff,  
        1px -1px 0px #fff,
        -1px 1px 0px #fff,
        1px 1px 0px #fff;
    }

    .index-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      position: relative;
      top: 4px; /* 종이와 겹치게 */
    }

    /* 서류철 인덱스 탭 디자인 */
    .tab-btn {
      min-width: 140px;
      padding: 16px 20px 20px;
      border-radius: 24px 24px 0 0;
      background: #ffb3c6;
      border: 4px solid var(--folder-border);
      border-bottom: none;
      color: #fff;
      font-weight: 900;
      font-size: 1.1rem;
      text-shadow: 1px 1px 0 var(--folder-border);
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .tab-btn:hover {
      background: #ff99b3;
      transform: translateY(-4px);
    }

    .tab-btn.active {
      background: var(--paper);
      color: var(--point);
      border-color: var(--point);
      text-shadow: none;
      padding-bottom: 24px;
      z-index: 2;
    }

    .content {
      padding: 0 30px 30px 60px;
      position: relative;
      z-index: 1;
    }

    .page {
      display: none;
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .page.active {
      display: block;
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.98) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* 다이어리 속지 느낌 */
    .paper {
      position: relative;
      background: 
        repeating-linear-gradient(
          180deg,
          transparent 0,
          transparent 39px,
          var(--line) 39px,
          var(--line) 40px
        ),
        var(--paper);
      background-position: 0 10px;
      border: 4px solid var(--point);
      border-radius: 0 var(--radius) var(--radius) var(--radius);
      padding: 40px;
      min-height: calc(100vh - var(--header-h) - 90px);
      box-shadow: 6px 6px 0px rgba(255, 102, 178, 0.2);
    }

    .paper::after {
      content: "★";
      position: absolute;
      bottom: 20px;
      right: 20px;
      color: var(--accent);
      font-size: 2rem;
      text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
    }

    .character-grid-wrap {
      display: grid;
      gap: 30px;
    }

    .team-row {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 24px;
    }

    /* 캐릭터 카드 - 마법소녀 포토카드 느낌 */
    .char-card {
      position: relative;
      background: #fff;
      border: 3px solid #ffd1dc;
      border-radius: var(--radius-sm);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 8px 0 #ffe6f2;
    }

    .char-card::before {
      content: "⭐";
      position: absolute;
      top: -12px;
      right: -12px;
      font-size: 1.5rem;
      filter: drop-shadow(0 2px 4px rgba(255,204,0,0.4));
      z-index: 2;
      opacity: 0;
      transform: scale(0);
      transition: all 0.2s ease;
    }

    .char-card:hover {
      transform: translateY(-8px) rotate(-2deg);
      border-color: var(--point);
      box-shadow: 0 12px 0 #ffb3c6;
    }

    .char-card:hover::before {
      opacity: 1;
      transform: scale(1) rotate(15deg);
    }

    .char-thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      overflow: hidden;
      background: #fdf5ff;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed #ffb3c6;
    }

    /* 절대 건드리지 않은 이미지 영역 */
    .char-thumb img,
    .profile-visual img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #ffffff;
      display: block;
      filter: none !important;
      image-rendering: auto;
    }

    .char-name {
      width: 100%;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--point-dark);
      background: #ffe6f2;
      padding: 6px 0;
      border-radius: 12px;
      word-break: keep-all;
    }

    .profile-page-inner {
      display: grid;
      grid-template-columns: minmax(320px, 430px) minmax(0, 1fr);
      gap: 36px;
      align-items: start;
    }

    .profile-side {
      position: sticky;
      top: calc(var(--header-h) + 40px);
      display: grid;
      gap: 20px;
    }

    .back-btn {
      align-self: flex-start;
      padding: 12px 24px;
      border-radius: 999px;
      background: #fff;
      border: 3px solid var(--folder-border);
      color: var(--point);
      font-weight: 900;
      box-shadow: 0 4px 0 var(--folder-border);
      transition: transform 0.1s;
    }
    .back-btn:active {
      transform: translateY(4px);
      box-shadow: 0 0 0 var(--folder-border);
    }

    .profile-visual-card {
      background: #fff;
      border: 4px solid var(--point);
      border-radius: 32px;
      padding: 24px;
      box-shadow: 8px 8px 0px rgba(255, 84, 154, 0.2);
    }

    .profile-visual {
      width: 100%;
      aspect-ratio: 2 / 3;
      border-radius: 20px;
      overflow: hidden;
      background: #fdf5ff;
      border: 3px dashed #ffb3c6;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 변신 버튼 */
    .transform-btn {
      width: 100%;
      margin-top: 20px;
      padding: 18px 16px;
      border-radius: 20px;
      background: linear-gradient(45deg, var(--point), #ff85a2, var(--accent), var(--point));
      background-size: 300% 300%;
      animation: magicGlow 3s ease infinite;
      color: #fff;
      font-weight: 900;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      border: 3px solid #fff;
      box-shadow: 0 8px 24px rgba(255, 84, 154, 0.5);
      text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
      transition: transform 0.2s;
    }
    .transform-btn:hover {
      transform: scale(1.03);
    }
    .transform-btn:active {
      transform: scale(0.95);
    }

    @keyframes magicGlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .transform-btn.active {
      background: linear-gradient(45deg, var(--magic-blue), #b3e6ff, #ffccff, var(--magic-blue));
      background-size: 300% 300%;
      box-shadow: 0 8px 24px rgba(102, 204, 255, 0.5);
      color: #fff;
    }

    .profile-detail-card {
      background: rgba(255, 255, 255, 0.9);
      border: 3px solid #ffb3c6;
      border-radius: 32px;
      padding: 30px;
      box-shadow: inset 0 0 20px #fff5f8;
      min-width: 0;
    }

    .profile-detail-list {
      display: grid;
      gap: 16px;
    }

    .detail-item {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 20px;
      align-items: start;
      padding: 18px 0;
      border-bottom: 2px dashed #ffcce0;
    }

    .detail-item:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-weight: 900;
      color: #fff;
      background: var(--point);
      padding: 6px 16px;
      border-radius: 12px;
      text-align: center;
      transform: rotate(-2deg);
    }

    .detail-value {
      min-width: 0;
      white-space: pre-wrap;
      line-height: 1.8;
      word-break: keep-all;
      font-weight: 700;
      padding-top: 4px;
    }

    /* 가이드 섹션 스타일 */
    .guide-wrap {
      display: grid;
      gap: 24px;
    }

    .guide-title {
      margin: 0;
      font-size: 1.6rem;
      color: var(--point-dark);
      font-weight: 900;
      padding-bottom: 10px;
      border-bottom: 3px dashed #ffcce0;
    }

    .guide-list {
      display: grid;
      gap: 16px;
    }

    .guide-item {
      background: #fff;
      border: 3px solid #ffd1dc;
      border-radius: 24px;
      box-shadow: 0 4px 0 #ffe6f2;
      transition: border-color 0.2s ease;
    }

    .guide-item:hover {
      border-color: var(--point);
    }

    .guide-content {
      padding: 24px;
      line-height: 1.8;
      white-space: pre-wrap;
      color: var(--ink);
      font-weight: 700;
      font-size: 1.05rem;
      word-break: keep-all;
    }

    @media (max-width: 1200px) {
      .team-row {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .profile-page-inner {
        grid-template-columns: 1fr;
      }
      .profile-side {
        position: static;
      }
    }

    @media (max-width: 760px) {
      .app {
        padding: 16px;
      }
      .folder {
        border-radius: 24px;
      }
      .folder::before {
        width: 20px;
      }
      .titlebar {
        padding: 24px 20px 0px 30px;
        align-items: flex-start;
        flex-direction: column;
      }
      .content {
        padding: 0 16px 16px 30px;
      }
      .paper {
        padding: 24px 20px;
        border-radius: 0 16px 16px 16px;
      }
      .team-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }
      .detail-item {
        grid-template-columns: 1fr;
        gap: 8px;
        border-bottom: none;
        background: #fdf5ff;
        padding: 16px;
        border-radius: 16px;
      }
      .detail-label {
        align-self: flex-start;
        transform: none;
      }
      .tab-btn {
        min-width: 110px;
        padding: 12px 16px 16px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="folder">
      <header class="titlebar">
        <h1>우리 동아리 정상운영 합니다!</h1>
        <nav class="index-tabs">
          <button class="tab-btn active" data-target="charactersPage">첫번째 인덱스</button>
          <button class="tab-btn" data-target="guidePage">두번째 인덱스</button>
        </nav>
      </header>

      <main class="content">
        <section class="page active" id="charactersPage">
          <div class="paper">
            <div class="character-grid-wrap" id="characterGridWrap"></div>
          </div>
        </section>

        <section class="page" id="profilePage">
          <div class="paper">
            <div class="profile-page-inner">
              <div class="profile-side">
                <button class="back-btn" type="button" onclick="history.back()">← 뒤로가기</button>
                <div class="profile-visual-card">
                  <div class="profile-visual">
                    <img id="profileBodyImage" src="" alt="캐릭터 전신 사진" />
                  </div>
                  <button class="transform-btn" id="transformBtn">변신!</button>
                </div>
              </div>

              <div class="profile-detail-card">
                <div class="profile-detail-list" id="profileDetailList"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="page" id="guidePage">
          <div class="paper">
            <div class="guide-wrap">
              <h2 class="guide-title">참고하면 좋은 것들</h2>
              <div class="guide-list" id="guideList"></div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

      2) guideItems 배열에 텍스트를 추가하거나 수정하면 '참고하면 좋은 것들' 페이지에 반영됩니다.
      3) 이미지는 같은 저장소 안에 넣고 상대 경로로 연결하면 됩니다.

          <rect x="28" y="28" width="${width - 56}" height="${height - 56}" rx="24" fill="#f4efe7" stroke="#496b9f" stroke-width="4" stroke-dasharray="10 10"/>

        </svg>
      `;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    // 가이드 항목 데이터를 배열 형태로 입력할 수 있습니다.
    const guideItems = [
      "첫번째 인덱스에서는 원하는 캐릭터의 사진이나 이름이 들어간 카드를 눌러 전체 페이지 프로필 화면으로 이동할 수 있습니다.",
      "프로필 화면의 '변신!' 버튼을 누르면 캐릭터가 변신 버전 프로필로 바뀌고, 다시 누르면 기본 상태로 돌아옵니다.",
      "이곳에 동아리원들이 알아야 할 추가적인 참고 사항이나 규칙 등을 자유롭게 길게 적을 수 있습니다.\n(줄바꿈도 이렇게 자연스럽게 적용됩니다.)"
    ];

    const pageEls = document.querySelectorAll(".page");
    const tabBtns = document.querySelectorAll(".tab-btn");
    const characterGridWrap = document.getElementById("characterGridWrap");
    const transformBtn = document.getElementById("transformBtn");
    const profileBodyImage = document.getElementById("profileBodyImage");
    const profileDetailList = document.getElementById("profileDetailList");
    const guideList = document.getElementById("guideList");

    let selectedCharacterId = null;
    let isTransformMode = false;

    function getCharacterById(id) {
      return characterData.find(character => character.id === id);
    }

    function showPage(pageId) {
      pageEls.forEach(page => page.classList.toggle("active", page.id === pageId));
      tabBtns.forEach(btn => btn.classList.toggle("active", btn.dataset.target === pageId || (pageId === "profilePage" && btn.dataset.target === "charactersPage")));
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function setRoute(hash) {
      if (location.hash === hash) {
        syncFromHash();
        return;
      }
      location.hash = hash;
    }

    function syncFromHash() {
      const hash = location.hash || "#characters";

      if (hash.startsWith("#character-")) {
        const id = Number(hash.replace("#character-", ""));
        const character = getCharacterById(id);
        if (character) {
          selectedCharacterId = id;
          isTransformMode = false;
          renderProfile();
          showPage("profilePage");
          return;
        }
      }

      if (hash === "#guide") {
        showPage("guidePage");
        return;
      }

      showPage("charactersPage");
    }

    function renderCharacters() {
      const team1 = characterData.filter(item => item.team === 1);
      const team2 = characterData.filter(item => item.team === 2);

      characterGridWrap.innerHTML = [team1, team2].map(team => {
        const cards = team.map(character => `
          <button class="char-card" type="button" onclick="openProfile(${character.id})">
            <div class="char-thumb">
              <img src="${character.thumb}" alt="${character.name} 프로필 사진" />
            </div>
            <div class="char-name">${character.name}</div>
          </button>
        `).join("");

        return `<div class="team-row">${cards}</div>`;
      }).join("");
    }

    function openProfile(id) {
      setRoute(`#character-${id}`);
    }

    function renderProfile() {
      const character = getCharacterById(selectedCharacterId);
      if (!character) return;

      const current = isTransformMode ? {
        name: character.transform.name,
        gender: character.gender,
        age: character.age,
        appearance: character.transform.appearance,
        personality: character.transform.personality,
        feature: character.transform.feature,
        transformName: character.transform.transformName,
        body: character.transform.body
      } : {
        name: character.name,
        gender: character.gender,
        age: character.age,
        appearance: character.appearance,
        personality: character.personality,
        feature: character.feature,
        body: character.body
      };

      profileBodyImage.src = current.body;
      profileBodyImage.alt = `${current.name} 전신 사진`;

      const detailRows = [
        ["이름", current.name],
        ...(isTransformMode ? [["변신명", current.transformName]] : []),
        ["성별", current.gender],
        ["나이", current.age],
        ["외관", current.appearance],
        ["성격", current.personality],
        ["특징", current.feature]
      ];

      profileDetailList.innerHTML = detailRows.map(([label, value]) => `
        <div class="detail-item">
          <div class="detail-label">${label}</div>
          <div class="detail-value">${value}</div>
        </div>
      `).join("");

      transformBtn.classList.toggle("active", isTransformMode);
      transformBtn.textContent = isTransformMode ? "원래대로" : "변신!";
    }

    function toggleTransform() {
      if (!selectedCharacterId) return;
      isTransformMode = !isTransformMode;
      renderProfile();
    }

    function renderGuide() {
      guideList.innerHTML = guideItems.map(content => `
        <div class="guide-item">
          <div class="guide-content">${content}</div>
        </div>
      `).join("");
    }

    tabBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        const targetHash = btn.dataset.target === "guidePage" ? "#guide" : "#characters";
        setRoute(targetHash);
      });
    });

    window.addEventListener("hashchange", syncFromHash);
    transformBtn.addEventListener("click", toggleTransform);

    renderCharacters();
    renderGuide();
    
    if (!location.hash) {
      location.hash = "#characters";
    } else {
      syncFromHash();
    }

    window.openProfile = openProfile;
  </script>
