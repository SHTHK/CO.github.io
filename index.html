<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리 동아리 정상운영 합니다!</title>
  <style>
    :root {
      --bg: #fff6fb;
      --desk: #ffd7ea;
      --folder: #fff9ee;
      --folder-edge: #f2d8b8;
      --paper: #fffefb;
      --line: #d9e9ff;
      --ink: #3b2f46;
      --point: #6b7cff;
      --point-dark: #4650a8;
      --accent: #ff7eb6;
      --accent-soft: #ffe36e;
      --mint: #9fe4d0;
      --soft: #fff1dd;
      --shadow: 0 20px 44px rgba(118, 85, 140, 0.16);
      --radius: 24px;
      --radius-sm: 16px;
      --header-h: 92px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.75), transparent 28%),
        radial-gradient(circle at top right, rgba(255,230,120,0.35), transparent 24%),
        linear-gradient(180deg, #fff8ff 0%, #ffeef7 38%, #fff0d9 100%);
    }

    button, input, textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: none;
      background: none;
    }

    .app {
      min-height: 100vh;
      padding: 26px;
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .folder {
      position: relative;
      width: min(1400px, 100%);
      min-height: calc(100vh - 52px);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0.2)),
        var(--folder);
      border: 1px solid rgba(118, 85, 140, 0.12);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .folder::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.7), rgba(255,255,255,0.12));
    }

    .folder::after {
      content: "✦ ✦ ✦";
      position: absolute;
      right: 24px;
      top: 18px;
      font-size: 1rem;
      letter-spacing: 8px;
      color: rgba(255, 126, 182, 0.55);
      pointer-events: none;
    }

    .titlebar {
      position: sticky;
      top: 0;
      z-index: 20;
      min-height: var(--header-h);
      padding: 26px 34px 18px;
      background:
        linear-gradient(180deg, rgba(255,249,238,0.98), rgba(255,241,249,0.93));
      backdrop-filter: blur(4px);
      border-bottom: 1px solid rgba(107, 124, 255, 0.14);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 2vw, 2.4rem);
      letter-spacing: -0.03em;
      font-weight: 900;
      color: var(--point-dark);
      text-shadow: 0 2px 0 rgba(255,255,255,0.8);
    }

    .index-tabs {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .tab-btn {
      min-width: 132px;
      padding: 14px 16px;
      border-radius: 20px 20px 8px 8px;
      background: linear-gradient(180deg, #ffe97f, #ffd6e8);
      color: var(--point-dark);
      font-weight: 900;
      box-shadow: inset 0 -2px 0 rgba(70, 80, 168, 0.1);
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .tab-btn:hover {
      transform: translateY(-2px);
    }

    .tab-btn.active {
      background: linear-gradient(180deg, #ffffff, #fff8fd);
      color: var(--accent);
      box-shadow: 0 8px 20px rgba(107, 124, 255, 0.12);
    }

    .content {
      padding: 26px;
    }

    .page {
      display: none;
      animation: fadeIn 0.22s ease;
    }

    .page.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .paper {
      position: relative;
      background:
        radial-gradient(circle at 92% 10%, rgba(255, 233, 127, 0.18), transparent 12%),
        radial-gradient(circle at 88% 18%, rgba(255, 126, 182, 0.12), transparent 10%),
        repeating-linear-gradient(
          180deg,
          transparent 0,
          transparent 34px,
          var(--line) 34px,
          var(--line) 35px
        ),
        var(--paper);
      border: 1px solid rgba(107, 124, 255, 0.12);
      border-radius: var(--radius);
      padding: 28px;
      min-height: calc(100vh - var(--header-h) - 104px);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.8);
    }

    .paper::before {
      content: "";
      position: absolute;
      left: 38px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: rgba(255, 126, 182, 0.34);
      pointer-events: none;
    }

    .character-grid-wrap {
      display: grid;
      gap: 22px;
    }

    .team-row {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 18px;
    }

    .char-card {
      position: relative;
      background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(255,247,252,0.92));
      border: 1px solid rgba(107, 124, 255, 0.16);
      border-radius: 24px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      min-width: 0;
      overflow: hidden;
    }

    .char-card::before {
      content: "★";
      position: absolute;
      top: 10px;
      right: 12px;
      font-size: 0.9rem;
      color: rgba(255, 126, 182, 0.55);
    }

    .char-card:hover {
      transform: translateY(-4px) rotate(-0.4deg);
      box-shadow: 0 16px 30px rgba(107, 124, 255, 0.16);
      border-color: rgba(255, 126, 182, 0.38);
    }

    .char-thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      overflow: hidden;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(47, 42, 36, 0.08);
    }

    .char-thumb img,
    .profile-visual img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #ffffff;
      display: block;
      filter: none !important;
      image-rendering: auto;
    }

    .char-name {
      width: 100%;
      text-align: center;
      font-size: 0.96rem;
      font-weight: 800;
      line-height: 1.35;
      word-break: keep-all;
    }

    .profile-page-inner {
      display: grid;
      grid-template-columns: minmax(320px, 430px) minmax(0, 1fr);
      gap: 28px;
      align-items: start;
    }

    .profile-side {
      position: sticky;
      top: calc(var(--header-h) + 40px);
      display: grid;
      gap: 16px;
    }

    .back-btn {
      align-self: flex-start;
      padding: 11px 16px;
      border-radius: 999px;
      background: rgba(73, 107, 159, 0.12);
      color: var(--point-dark);
      font-weight: 800;
    }

    .profile-visual-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(255,245,250,0.92));
      border: 1px solid rgba(107, 124, 255, 0.16);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 14px 30px rgba(107, 124, 255, 0.12);
    }

    .profile-visual {
      width: 100%;
      aspect-ratio: 2 / 3;
      border-radius: 18px;
      overflow: hidden;
      background: #ffffff;
      border: 1px solid rgba(47, 42, 36, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .transform-btn {
      width: 100%;
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--point), var(--accent));
      color: #fff;
      font-weight: 900;
      letter-spacing: -0.02em;
      box-shadow: 0 10px 18px rgba(107, 124, 255, 0.24);
    }

    .transform-btn.active {
      background: linear-gradient(135deg, var(--accent), #ffb5d6);
    }

    .profile-detail-card {
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(73, 107, 159, 0.16);
      border-radius: 24px;
      padding: 22px;
      min-width: 0;
    }

    .profile-detail-list {
      display: grid;
      gap: 14px;
    }

    .detail-item {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
      padding: 14px 0;
      border-bottom: 1px dashed rgba(73, 107, 159, 0.22);
    }

    .detail-item:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-weight: 900;
      color: var(--point-dark);
    }

    .detail-value {
      min-width: 0;
      white-space: pre-wrap;
      line-height: 1.75;
      word-break: keep-all;
    }

    .guide-wrap {
      display: grid;
      gap: 24px;
    }

    .guide-list {
      display: grid;
      gap: 12px;
    }

    .guide-item {
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(73, 107, 159, 0.16);
      border-radius: 18px;
      overflow: hidden;
    }

    .guide-question {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      text-align: left;
      font-weight: 800;
      color: var(--ink);
      background: transparent;
    }

    .guide-question span:last-child {
      font-size: 1.1rem;
      color: var(--point-dark);
      transition: transform 0.18s ease;
    }

    .guide-item.open .guide-question span:last-child {
      transform: rotate(90deg);
    }

    .guide-answer {
      display: none;
      padding: 0 20px 18px;
      line-height: 1.75;
      white-space: pre-wrap;
      color: rgba(47, 42, 36, 0.92);
    }

    .guide-item.open .guide-answer {
      display: block;
    }

    .guide-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 20px 18px;
    }

    .mini-btn {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.92rem;
      font-weight: 800;
      background: rgba(73, 107, 159, 0.1);
      color: var(--point-dark);
    }

    .mini-btn.delete {
      background: rgba(201, 127, 84, 0.14);
      color: #934d26;
    }

    .editor-card {
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(73, 107, 159, 0.16);
      border-radius: 22px;
      padding: 22px;
      display: grid;
      gap: 14px;
    }

    .editor-card h2 {
      margin: 0;
      font-size: 1.16rem;
    }

    .form-grid {
      display: grid;
      gap: 12px;
    }

    .form-grid label {
      display: grid;
      gap: 8px;
      font-weight: 800;
    }

    .form-grid input,
    .form-grid textarea {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(73, 107, 159, 0.22);
      background: #fff;
      color: var(--ink);
      outline: none;
    }

    .form-grid textarea {
      min-height: 150px;
      resize: vertical;
      line-height: 1.6;
    }

    .editor-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .primary-btn,
    .secondary-btn,
    .ghost-btn {
      padding: 12px 16px;
      border-radius: 14px;
      font-weight: 900;
    }

    .primary-btn {
      background: var(--point);
      color: #fff;
    }

    .secondary-btn {
      background: var(--accent);
      color: #fff;
    }

    .ghost-btn {
      background: rgba(73, 107, 159, 0.1);
      color: var(--point-dark);
    }

    .status-text {
      min-height: 1.4em;
      font-size: 0.94rem;
      font-weight: 700;
      color: var(--point-dark);
    }

    @media (max-width: 1200px) {
      .team-row {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .profile-page-inner {
        grid-template-columns: 1fr;
      }

      .profile-side {
        position: static;
      }
    }

    @media (max-width: 760px) {
      .app {
        padding: 12px;
      }

      .titlebar {
        padding: 18px 18px 14px;
        align-items: flex-start;
        flex-direction: column;
      }

      .content {
        padding: 14px;
      }

      .paper {
        padding: 16px;
      }

      .paper::before {
        left: 22px;
      }

      .team-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .detail-item {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .tab-btn {
        min-width: 120px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="folder">
      <header class="titlebar">
        <h1>우리 동아리 정상운영 합니다!</h1>
        <nav class="index-tabs">
          <button class="tab-btn active" data-target="charactersPage">첫번째 인덱스</button>
          <button class="tab-btn" data-target="guidePage">두번째 인덱스</button>
        </nav>
      </header>

      <main class="content">
        <section class="page active" id="charactersPage">
          <div class="paper">
            <div class="character-grid-wrap" id="characterGridWrap"></div>
          </div>
        </section>

        <section class="page" id="profilePage">
          <div class="paper">
            <div class="profile-page-inner">
              <div class="profile-side">
                                <div class="profile-visual-card">
                  <div class="profile-visual">
                    <img id="profileBodyImage" src="" alt="캐릭터 전신 사진" />
                  </div>
                  <button class="transform-btn" id="transformBtn">변신!</button>
                </div>
              </div>

              <div class="profile-detail-card">
                <div class="profile-detail-list" id="profileDetailList"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="page" id="guidePage">
          <div class="paper">
            <div class="guide-wrap">
              <div class="guide-list" id="guideList"></div>

              <div class="editor-card">
                <h2>플레이 가이드 항목 편집</h2>
                <div class="form-grid">
                  <label>
                    질문
                    <input type="text" id="guideQuestionInput" placeholder="질문을 입력하세요" />
                  </label>
                  <label>
                    내용
                    <textarea id="guideAnswerInput" placeholder="답변 내용을 입력하세요"></textarea>
                  </label>
                </div>
                <div class="editor-actions">
                  <button class="primary-btn" id="addGuideBtn">새 항목 추가</button>
                  <button class="secondary-btn" id="updateGuideBtn">선택 항목 수정</button>
                  <button class="ghost-btn" id="clearGuideBtn">입력칸 비우기</button>
                  <button class="ghost-btn" id="resetGuideBtn">기본 항목 복원</button>
                </div>
                <div class="status-text" id="guideStatus"></div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

      1) characterData 안의 텍스트/이미지 경로를 바꾸면 캐릭터 정보가 바뀝니다.
      2) 가이드는 화면 안에서 추가/수정/삭제 가능하며 localStorage에 저장됩니다.
      3) 이미지는 같은 저장소 안에 넣고 상대 경로로 연결하면 됩니다.

          <rect width="100%" height="100%" fill="#ffffff"/>
          <rect x="28" y="28" width="${width - 56}" height="${height - 56}" rx="24" fill="#f4efe7" stroke="#496b9f" stroke-width="4" stroke-dasharray="10 10"/>
          <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" font-size="42" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" fill="#496b9f" font-weight="700">${label}</text>

      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;

    const defaultGuideItems = [
      {
        question: "이 홈페이지는 어떻게 보나요?",
        answer: "첫번째 인덱스에서는 캐릭터를 고를 수 있고, 두번째 인덱스에서는 플레이 가이드를 볼 수 있습니다."

      {
        question: "캐릭터 프로필은 어디서 열 수 있나요?",
        answer: "캐릭터 선택 화면에서 원하는 캐릭터의 사진이나 이름이 들어간 카드를 누르면 전체 페이지 프로필 화면으로 이동합니다."
      },
      {
        question: "변신 버튼은 어떤 기능인가요?",
        answer: "프로필 화면의 변신! 버튼을 누르면 변신 버전 프로필로 바뀌고, 다시 누르면 기본 상태로 돌아옵니다."
      }
    ];

    const pageEls = document.querySelectorAll(".page");
    const tabBtns = document.querySelectorAll(".tab-btn");
    const characterGridWrap = document.getElementById("characterGridWrap");
        const transformBtn = document.getElementById("transformBtn");
    const profileBodyImage = document.getElementById("profileBodyImage");
    const profileDetailList = document.getElementById("profileDetailList");
    const guideList = document.getElementById("guideList");
    const guideQuestionInput = document.getElementById("guideQuestionInput");
    const guideAnswerInput = document.getElementById("guideAnswerInput");
    const addGuideBtn = document.getElementById("addGuideBtn");
    const updateGuideBtn = document.getElementById("updateGuideBtn");
    const clearGuideBtn = document.getElementById("clearGuideBtn");
    const resetGuideBtn = document.getElementById("resetGuideBtn");
    const guideStatus = document.getElementById("guideStatus");

    let selectedCharacterId = null;
    let isTransformMode = false;
    let editingGuideIndex = null;

    function getCharacterById(id) {
      return characterData.find(character => character.id === id);
    }

    function showPage(pageId) {
      pageEls.forEach(page => page.classList.toggle("active", page.id === pageId));
      tabBtns.forEach(btn => btn.classList.toggle("active", btn.dataset.target === pageId || (pageId === "profilePage" && btn.dataset.target === "charactersPage")));
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function setRoute(hash) {
      if (location.hash === hash) {
        syncFromHash();
        return;
      }
      location.hash = hash;
    }

    function syncFromHash() {
      const hash = location.hash || "#characters";

      if (hash.startsWith("#character-")) {
        const id = Number(hash.replace("#character-", ""));
        const character = getCharacterById(id);
        if (character) {
          selectedCharacterId = id;
          isTransformMode = false;
          renderProfile();
          showPage("profilePage");
          return;
        }
      }

      if (hash === "#guide") {
        showPage("guidePage");
        return;
      }

      showPage("charactersPage");
    }

    function renderCharacters() {
      const team1 = characterData.filter(item => item.team === 1);
      const team2 = characterData.filter(item => item.team === 2);

      characterGridWrap.innerHTML = [team1, team2].map(team => {
        const cards = team.map(character => `
          <button class="char-card" type="button" onclick="openProfile(${character.id})">
            <div class="char-thumb">
              <img src="${character.thumb}" alt="${character.name} 프로필 사진" />
            </div>
            <div class="char-name">${character.name}</div>
          </button>
        `).join("");

        return `<div class="team-row">${cards}</div>`;
      }).join("");
    }

    function openProfile(id) {
      setRoute(`#character-${id}`);
    }

    function renderProfile() {
      const character = getCharacterById(selectedCharacterId);
      if (!character) return;

      const current = isTransformMode ? {
        name: character.transform.name,
        gender: character.gender,
        age: character.age,
        appearance: character.transform.appearance,
        personality: character.transform.personality,
        feature: character.transform.feature,
        transformName: character.transform.transformName,
        body: character.transform.body
      } : {
        name: character.name,
        gender: character.gender,
        age: character.age,
        appearance: character.appearance,
        personality: character.personality,
        feature: character.feature,
        body: character.body
      };

      profileBodyImage.src = current.body;
      profileBodyImage.alt = `${current.name} 전신 사진`;

      const detailRows = [
        ["이름", current.name],
        ...(isTransformMode ? [["변신명", current.transformName]] : []),
        ["성별", current.gender],
        ["나이", current.age],
        ["외관", current.appearance],
        ["성격", current.personality],
        ["특징", current.feature]
      ];

      profileDetailList.innerHTML = detailRows.map(([label, value]) => `
        <div class="detail-item">
          <div class="detail-label">${label}</div>
          <div class="detail-value">${value}</div>
        </div>
      `).join("");

      transformBtn.classList.toggle("active", isTransformMode);
      transformBtn.textContent = isTransformMode ? "원래대로" : "변신!";
    }

    function toggleTransform() {
      if (!selectedCharacterId) return;
      isTransformMode = !isTransformMode;
      renderProfile();
    }

    function getGuideItems() {
      const saved = localStorage.getItem("clubGuideItems");
      if (!saved) return [...defaultGuideItems];

      try {
        const parsed = JSON.parse(saved);
        return Array.isArray(parsed) ? parsed : [...defaultGuideItems];
      } catch {
        return [...defaultGuideItems];
      }
    }

    function saveGuideItems(items) {
      localStorage.setItem("clubGuideItems", JSON.stringify(items));
    }

    let guideItems = getGuideItems();

    function setGuideStatus(message) {
      guideStatus.textContent = message;
    }

    function clearGuideEditor() {
      editingGuideIndex = null;
      guideQuestionInput.value = "";
      guideAnswerInput.value = "";
      setGuideStatus("");
    }

    function fillGuideEditor(index) {
      const item = guideItems[index];
      if (!item) return;
      editingGuideIndex = index;
      guideQuestionInput.value = item.question;
      guideAnswerInput.value = item.answer;
      setGuideStatus(`선택된 항목: ${index + 1}번`);
      guideQuestionInput.focus();
    }

    function renderGuide() {
      guideList.innerHTML = guideItems.map((item, index) => `
        <div class="guide-item">
          <button type="button" class="guide-question" onclick="toggleGuideItem(${index}, this)">
            <span>${item.question}</span>
            <span>▶</span>
          </button>
          <div class="guide-answer">${item.answer}</div>
          <div class="guide-actions">
            <button type="button" class="mini-btn" onclick="fillGuideEditor(${index})">수정</button>
            <button type="button" class="mini-btn delete" onclick="deleteGuideItem(${index})">삭제</button>
          </div>
        </div>
      `).join("");
    }

    function toggleGuideItem(index, buttonEl) {
      const item = buttonEl.closest(".guide-item");
      item.classList.toggle("open");
    }

    function addGuideItem() {
      const question = guideQuestionInput.value.trim();
      const answer = guideAnswerInput.value.trim();

      if (!question || !answer) {
        setGuideStatus("질문과 내용을 모두 입력해야 합니다.");
        return;
      }

      guideItems.push({ question, answer });
      saveGuideItems(guideItems);
      renderGuide();
      clearGuideEditor();
      setGuideStatus("새 항목이 추가되었습니다.");
    }

    function updateGuideItem() {
      if (editingGuideIndex === null) {
        setGuideStatus("먼저 수정할 항목을 선택하세요.");
        return;
      }

      const question = guideQuestionInput.value.trim();
      const answer = guideAnswerInput.value.trim();

      if (!question || !answer) {
        setGuideStatus("질문과 내용을 모두 입력해야 합니다.");
        return;
      }

      guideItems[editingGuideIndex] = { question, answer };
      saveGuideItems(guideItems);
      renderGuide();
      clearGuideEditor();
      setGuideStatus("선택한 항목이 수정되었습니다.");
    }

    function deleteGuideItem(index) {
      guideItems.splice(index, 1);
      saveGuideItems(guideItems);
      renderGuide();
      if (editingGuideIndex === index) clearGuideEditor();
      setGuideStatus("선택한 항목이 삭제되었습니다.");
    }

    function resetGuideItems() {
      guideItems = [...defaultGuideItems];
      saveGuideItems(guideItems);
      renderGuide();
      clearGuideEditor();
      setGuideStatus("기본 항목으로 복원되었습니다.");
    }

    tabBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        const targetHash = btn.dataset.target === "guidePage" ? "#guide" : "#characters";
        setRoute(targetHash);
      });
    });

    window.addEventListener("hashchange", syncFromHash);

    transformBtn.addEventListener("click", toggleTransform);
    addGuideBtn.addEventListener("click", addGuideItem);
    updateGuideBtn.addEventListener("click", updateGuideItem);
    clearGuideBtn.addEventListener("click", clearGuideEditor);
    resetGuideBtn.addEventListener("click", resetGuideItems);

    renderCharacters();
    renderGuide();
    if (!location.hash) {
      location.hash = "#characters";
    } else {
      syncFromHash();
    }

    window.openProfile = openProfile;
    window.toggleGuideItem = toggleGuideItem;
    window.fillGuideEditor = fillGuideEditor;
    window.deleteGuideItem = deleteGuideItem;
  </script>
