<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리 동아리 정상운영 합니다!</title>
  <style>
    :root {
      --bg-1: #fff7fb;
      --bg-2: #ffe2f0;
      --bg-3: #ffd0e7;
      --paper: #ffffff;
      --paper-soft: #fff8fc;
      --pink: #ff3f93;
      --pink-dark: #e11877;
      --pink-soft: #ff8ec2;
      --line: #ffc7df;
      --ink: #4a2440;
      --ink-soft: #7a4e69;
      --shadow: 0 18px 40px rgba(255, 63, 147, 0.16);
      --radius-lg: 28px;
      --radius-md: 20px;
      --radius-sm: 14px;
      --header-h: 94px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.95), transparent 28%),
        radial-gradient(circle at top right, rgba(255,255,255,0.55), transparent 20%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 58%, var(--bg-3) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 8% 14%, rgba(255,255,255,0.7) 0 3px, transparent 4px),
        radial-gradient(circle at 88% 10%, rgba(255,255,255,0.7) 0 3px, transparent 4px),
        radial-gradient(circle at 14% 76%, rgba(255,255,255,0.55) 0 2px, transparent 3px),
        radial-gradient(circle at 78% 68%, rgba(255,255,255,0.55) 0 2px, transparent 3px);
    }

    img {
      display: block;
      max-width: 100%;
      filter: none !important;
      image-rendering: auto;
    }

    button {
      font: inherit;
      border: none;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .binder {
      width: min(1400px, 100%);
      min-height: calc(100vh - 48px);
      background: linear-gradient(180deg, rgba(255,255,255,0.75), rgba(255,255,255,0.55));
      border: 1px solid rgba(255, 63, 147, 0.18);
      border-radius: 30px;
      overflow: hidden;
      box-shadow: var(--shadow);
      position: relative;
    }

    .binder::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.18), transparent 18%),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.12) 0 1px, transparent 1px 38px);
      opacity: 0.65;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      min-height: var(--header-h);
      padding: 24px 30px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,245,251,0.95));
      border-bottom: 1px solid rgba(255, 63, 147, 0.14);
      backdrop-filter: blur(6px);
    }

    .title {
      margin: 0;
      font-size: clamp(1.65rem, 2vw, 2.4rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--pink-dark);
      text-shadow: 0 2px 0 rgba(255,255,255,0.9);
    }

    .tabs {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .tab-btn {
      min-width: 138px;
      padding: 13px 16px;
      border-radius: 18px 18px 8px 8px;
      background: linear-gradient(180deg, #ff8ec2, #ff58a0);
      color: #fff;
      font-weight: 900;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.08);
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    .tab-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(255, 63, 147, 0.18);
    }

    .tab-btn.active {
      background: linear-gradient(180deg, #ffffff, #fff4fa);
      color: var(--pink-dark);
      box-shadow: 0 10px 22px rgba(255, 63, 147, 0.14);
    }

    .content {
      padding: 24px;
    }

    .page {
      display: none;
      animation: fadeIn 0.2s ease;
    }

    .page.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .sheet {
      min-height: calc(100vh - var(--header-h) - 96px);
      padding: 28px;
      border-radius: var(--radius-lg);
      position: relative;
      background:
        radial-gradient(circle at 92% 8%, rgba(255, 63, 147, 0.08), transparent 12%),
        radial-gradient(circle at 86% 15%, rgba(255, 142, 194, 0.13), transparent 10%),
        repeating-linear-gradient(
          180deg,
          transparent 0 33px,
          var(--line) 33px 34px
        ),
        linear-gradient(180deg, var(--paper) 0%, var(--paper-soft) 100%);
      border: 1px solid rgba(255, 63, 147, 0.12);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.75);
    }

    .sheet::before {
      content: "";
      position: absolute;
      left: 38px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: rgba(255, 63, 147, 0.28);
      pointer-events: none;
    }

    .team-blocks {
      display: grid;
      gap: 24px;
    }

    .team-row {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 16px;
    }

    .char-card {
      position: relative;
      min-width: 0;
      padding: 14px;
      border-radius: 24px;
      border: 1px solid rgba(255, 63, 147, 0.16);
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,245,251,0.93));
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      box-shadow: 0 10px 22px rgba(255, 63, 147, 0.08);
    }

    .char-card::before {
      content: "★";
      position: absolute;
      top: 10px;
      right: 12px;
      color: rgba(255, 63, 147, 0.44);
      font-size: 0.9rem;
    }

    .char-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 63, 147, 0.34);
      box-shadow: 0 16px 28px rgba(255, 63, 147, 0.14);
    }

    .char-thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      border: 1px solid rgba(255, 63, 147, 0.1);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .char-thumb img,
    .profile-visual img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #fff;
    }

    .char-name {
      width: 100%;
      text-align: center;
      font-weight: 900;
      font-size: 0.97rem;
      line-height: 1.35;
      color: var(--ink);
      word-break: keep-all;
    }

    .profile-layout {
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
      gap: 28px;
      align-items: start;
    }

    .profile-side {
      position: sticky;
      top: calc(var(--header-h) + 36px);
      display: grid;
      gap: 14px;
    }

    .back-btn {
      width: fit-content;
      padding: 11px 16px;
      border-radius: 999px;
      background: linear-gradient(180deg, #fff, #fff1f8);
      color: var(--pink-dark);
      font-weight: 900;
      border: 1px solid rgba(255, 63, 147, 0.18);
      box-shadow: 0 8px 18px rgba(255, 63, 147, 0.12);
    }

    .profile-card,
    .detail-card,
    .guide-item {
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,246,252,0.94));
      border: 1px solid rgba(255, 63, 147, 0.14);
      border-radius: 24px;
      box-shadow: 0 14px 28px rgba(255, 63, 147, 0.08);
    }

    .profile-card {
      padding: 18px;
    }

    .profile-visual {
      width: 100%;
      aspect-ratio: 2 / 3;
      border-radius: 18px;
      overflow: hidden;
      background: #fff;
      border: 1px solid rgba(255, 63, 147, 0.1);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .transform-btn {
      width: 100%;
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--pink), var(--pink-soft));
      color: #fff;
      font-weight: 900;
      letter-spacing: -0.02em;
      box-shadow: 0 10px 18px rgba(255, 63, 147, 0.2);
    }

    .transform-btn.active {
      background: linear-gradient(135deg, var(--pink-dark), var(--pink));
    }

    .detail-card {
      padding: 22px;
    }

    .detail-list {
      display: grid;
      gap: 12px;
    }

    .detail-item {
      display: grid;
      grid-template-columns: 108px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
      padding: 14px 0;
      border-bottom: 1px dashed rgba(255, 63, 147, 0.18);
    }

    .detail-item:last-child { border-bottom: none; }

    .detail-label {
      font-weight: 900;
      color: var(--pink-dark);
    }

    .detail-value {
      min-width: 0;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: keep-all;
      color: var(--ink);
    }

    .guide-wrap {
      display: grid;
      gap: 14px;
    }

    .guide-list {
      display: grid;
      gap: 14px;
    }

    .guide-item {
      overflow: hidden;
    }

    .guide-question {
      width: 100%;
      padding: 18px 20px;
      background: transparent;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 16px;
      text-align: left;
      font-weight: 900;
      color: var(--ink);
    }

    .guide-arrow {
      color: var(--pink-dark);
      transition: transform 0.18s ease;
    }

    .guide-item.open .guide-arrow {
      transform: rotate(90deg);
    }

    .guide-answer {
      display: none;
      padding: 0 20px 20px;
      line-height: 1.8;
      color: var(--ink-soft);
      white-space: pre-wrap;
    }

    .guide-item.open .guide-answer { display: block; }

    @media (max-width: 1200px) {
      .team-row {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .profile-layout {
        grid-template-columns: 1fr;
      }

      .profile-side {
        position: static;
      }
    }

    @media (max-width: 760px) {
      .app { padding: 12px; }
      .header {
        padding: 18px 18px 14px;
        flex-direction: column;
        align-items: flex-start;
      }
      .content { padding: 14px; }
      .sheet { padding: 16px; }
      .sheet::before { left: 20px; }
      .team-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .detail-item {
        grid-template-columns: 1fr;
        gap: 8px;
      }
    }
  </style>
</head>

  <div class="app">
    <div class="binder">
      <header class="header">
        <h1 class="title">우리 동아리 정상운영 합니다!</h1>
        <nav class="tabs">
          <button class="tab-btn active" data-page="characters">첫번째 인덱스</button>
          <button class="tab-btn" data-page="guide">두번째 인덱스</button>
        </nav>
      </header>

      <main class="content">
        <section class="page active" id="charactersPage">
          <div class="sheet">
            <div class="team-blocks" id="characterGridWrap"></div>
          </div>
        </section>

        <section class="page" id="profilePage">
          <div class="sheet">
            <div class="profile-layout">
              <div class="profile-side">
                <button class="back-btn" id="backToListBtn" type="button">← 뒤로가기</button>
                <div class="profile-card">
                  <div class="profile-visual">
                    <img id="profileBodyImage" src="" alt="캐릭터 전신 사진" />
                  </div>
                  <button class="transform-btn" id="transformBtn" type="button">변신!</button>
                </div>
              </div>

              <div class="detail-card">
                <div class="detail-list" id="profileDetailList"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="page" id="guidePage">
          <div class="sheet">
            <div class="guide-wrap">
              <div class="guide-list" id="guideList"></div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

      { id: 12, team: 2, name: "캐릭터 12", gender: "남", age: "17", appearance: "여기에 평상시 외관 설명을 입력하세요.", personality: "여기에 평상시 성격 설명을 입력하세요.", feature: "여기에 평상시 특징 설명을 입력하세요.", thumb: makePlaceholder("프로필 12"), body: makePlaceholder("전신 12", "portrait"), transform: { transformName: "변신명 12", name: "변신 후 이름 12", appearance: "여기에 변신 후 외관 설명을 입력하세요.", personality: "여기에 변신 후 성격 설명을 입력하세요.", feature: "여기에 변신 후 특징 설명을 입력하세요.", body: makePlaceholder("변신 전신 12", "portrait") } }
    ];

    const defaultGuideItems = [
      {
        question: "이 홈페이지는 어떻게 보나요?",
        answer: "첫번째 인덱스에서는 캐릭터를 고를 수 있고, 두번째 인덱스에서는 플레이 가이드를 볼 수 있습니다."
      },
      {
        question: "캐릭터 프로필은 어디서 열 수 있나요?",
        answer: "캐릭터 선택 화면에서 원하는 캐릭터의 사진이나 이름이 들어간 카드를 누르면 전체 페이지 프로필 화면으로 이동합니다."
      },
      {
        question: "변신 버튼은 어떤 기능인가요?",
        answer: "프로필 화면의 변신! 버튼을 누르면 변신 버전 프로필로 바뀌고, 다시 누르면 기본 상태로 돌아옵니다."
      }
    ];

    const pages = {
      characters: document.getElementById("charactersPage"),
      profile: document.getElementById("profilePage"),
      guide: document.getElementById("guidePage")
    };

    const tabButtons = document.querySelectorAll(".tab-btn");
    const characterGridWrap = document.getElementById("characterGridWrap");
    const guideList = document.getElementById("guideList");
    const profileBodyImage = document.getElementById("profileBodyImage");
    const profileDetailList = document.getElementById("profileDetailList");
    const transformBtn = document.getElementById("transformBtn");
    const backToListBtn = document.getElementById("backToListBtn");

    let selectedCharacterId = null;
    let isTransformMode = false;

    function getCharacterById(id) {
      return characterData.find(character => character.id === id);
    }

    function setActiveTab(pageKey) {
      tabButtons.forEach(button => {
        const buttonPage = button.dataset.page;
        const isActive = pageKey === "profile"
          ? buttonPage === "characters"
          : buttonPage === pageKey;
        button.classList.toggle("active", isActive);
      });
    }

    function showPage(pageKey) {
      Object.entries(pages).forEach(([key, pageEl]) => {
        pageEl.classList.toggle("active", key === pageKey);
      });
      setActiveTab(pageKey);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function applyRoute() {
      const hash = location.hash || "#characters";

      if (hash === "#guide") {
        showPage("guide");
        return;
      }

      if (hash.startsWith("#character-")) {
        const id = Number(hash.slice("#character-".length));
        const character = getCharacterById(id);
        if (character) {
          selectedCharacterId = id;
          isTransformMode = false;
          renderProfile();
          showPage("profile");
          return;
        }
      }

      showPage("characters");
    }

    function goToRoute(hash) {
      if (location.hash === hash) {
        applyRoute();
      } else {
        location.hash = hash;
      }
    }

    function renderCharacters() {
      const firstTeam = characterData.filter(character => character.team === 1);
      const secondTeam = characterData.filter(character => character.team === 2);

      characterGridWrap.innerHTML = [firstTeam, secondTeam].map(team => {
        const cardsHtml = team.map(character => `
          <button class="char-card" type="button" onclick="openProfile(${character.id})">
            <div class="char-thumb">
              <img src="${character.thumb}" alt="${character.name} 프로필 사진" />
            </div>
            <div class="char-name">${character.name}</div>
          </button>
        `).join("");

        return `<div class="team-row">${cardsHtml}</div>`;
      }).join("");
    }

    function renderGuide() {
      guideList.innerHTML = defaultGuideItems.map((item, index) => `
        <div class="guide-item">
          <button class="guide-question" type="button" onclick="toggleGuideItem(${index}, this)">
            <span>${item.question}</span>
            <span class="guide-arrow">▶</span>
          </button>
          <div class="guide-answer">${item.answer}</div>
        </div>
      `).join("");
    }

    function renderProfile() {
      const character = getCharacterById(selectedCharacterId);
      if (!character) return;

      const currentProfile = isTransformMode
        ? {
            name: character.transform.name,
            transformName: character.transform.transformName,
            gender: character.gender,
            age: character.age,
            appearance: character.transform.appearance,
            personality: character.transform.personality,
            feature: character.transform.feature,
            body: character.transform.body
          }
        : {
            name: character.name,
            gender: character.gender,
            age: character.age,
            appearance: character.appearance,
            personality: character.personality,
            feature: character.feature,
            body: character.body
          };

      profileBodyImage.src = currentProfile.body;
      profileBodyImage.alt = `${currentProfile.name} 전신 사진`;

      const rows = [
        ["이름", currentProfile.name],
        ...(isTransformMode ? [["변신명", currentProfile.transformName]] : []),
        ["성별", currentProfile.gender],
        ["나이", currentProfile.age],
        ["외관", currentProfile.appearance],
        ["성격", currentProfile.personality],
        ["특징", currentProfile.feature]
      ];

      profileDetailList.innerHTML = rows.map(([label, value]) => `
        <div class="detail-item">
          <div class="detail-label">${label}</div>
          <div class="detail-value">${value}</div>
        </div>
      `).join("");

      transformBtn.textContent = isTransformMode ? "원래대로" : "변신!";
      transformBtn.classList.toggle("active", isTransformMode);
    }

    function openProfile(id) {
      goToRoute(`#character-${id}`);
    }

    function toggleGuideItem(index, buttonEl) {
      const guideItem = buttonEl.closest(".guide-item");
      guideItem.classList.toggle("open");
    }

    tabButtons.forEach(button => {
      button.addEventListener("click", () => {
        const page = button.dataset.page;
        goToRoute(page === "guide" ? "#guide" : "#characters");
      });
    });

    transformBtn.addEventListener("click", () => {
      if (!selectedCharacterId) return;
      isTransformMode = !isTransformMode;
      renderProfile();
    });

    backToListBtn.addEventListener("click", () => {
      if (location.hash.startsWith("#character-") && history.length > 1) {
        history.back();
        setTimeout(() => {
          if (location.hash.startsWith("#character-")) {
            goToRoute("#characters");
          }
        }, 120);
      } else {
        goToRoute("#characters");
      }
    });

    window.addEventListener("hashchange", applyRoute);
    window.openProfile = openProfile;
    window.toggleGuideItem = toggleGuideItem;

    renderCharacters();
    renderGuide();

    if (!location.hash) {
      location.hash = "#characters";
    }
    applyRoute();
  </script>
</body>
